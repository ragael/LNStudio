    <script type="text/babel">
      const { useState, useEffect } = React;

      // Variáveis globais para o Firebase (inicializadas pelo App)
      let auth, db, appId;

      // ==================== STORAGE MANAGER (Direct Firestore) ====================
      const StorageManager = {
        saveLN: async (ln) => {
          if (!auth?.currentUser) throw new Error("Usuário não autenticado");
          const docRef = window.FirebaseAPI.doc(
            db,
            "artifacts",
            appId,
            "users",
            auth.currentUser.uid,
            "light_novels",
            ln.id,
          );
          await window.FirebaseAPI.setDoc(docRef, ln);
        },

        createLN: async (ln) => {
          const newLN = {
            ...ln,
            id: Date.now().toString(),
            createdAt: new Date().toISOString(),
            chapters: [],
            continuityDB: null,
            lastReadChapter: null,
          };
          await StorageManager.saveLN(newLN);
          return newLN;
        },

        getLN: async (id) => {
          if (!auth?.currentUser) return null;
          const docRef = window.FirebaseAPI.doc(
            db,
            "artifacts",
            appId,
            "users",
            auth.currentUser.uid,
            "light_novels",
            id,
          );
          const snap = await window.FirebaseAPI.getDoc(docRef);
          return snap.exists() ? snap.data() : null;
        },

        updateLN: async (id, updates) => {
          const ln = await StorageManager.getLN(id);
          if (ln) {
            const updated = { ...ln, ...updates };
            await StorageManager.saveLN(updated);
            return updated;
          }
          return null;
        },

        deleteLN: async (id) => {
          if (!auth?.currentUser) return;
          const docRef = window.FirebaseAPI.doc(
            db,
            "artifacts",
            appId,
            "users",
            auth.currentUser.uid,
            "light_novels",
            id,
          );
          await window.FirebaseAPI.deleteDoc(docRef);
        },

        addChapter: async (lnId, chapterData) => {
          const ln = await StorageManager.getLN(lnId);
          if (ln) {
            const chapter = {
              number: ln.chapters.length + 1,
              content: chapterData.content,
              metadata: chapterData.metadata || {
                ai_provider: "Unknown",
                model: "Unknown",
                plan: "Unknown",
                generated_at: new Date().toISOString(),
              },
              addedAt: new Date().toISOString(),
            };
            ln.chapters.push(chapter);
            ln.continuityDB = chapterData.continuity;

            await StorageManager.saveLN(ln);
            return ln;
          }
          return null;
        },

        exportLN: async (ln) => {
          const dataStr = JSON.stringify(ln, null, 2);
          const dataUri =
            "data:application/json;charset=utf-8," +
            encodeURIComponent(dataStr);
          const exportFileDefaultName = `${ln.title ? ln.title.replace(/\s+/g, "_") : "light_novel"}_backup.json`;
          const linkElement = document.createElement("a");
          linkElement.setAttribute("href", dataUri);
          linkElement.setAttribute("download", exportFileDefaultName);
          linkElement.click();
        },

        importLN: async (jsonData) => {
          try {
            const ln = JSON.parse(jsonData);
            ln.id = Date.now().toString();
            ln.createdAt = new Date().toISOString();
            await StorageManager.saveLN(ln);
            return ln;
          } catch (e) {
            console.error("Import error:", e);
            return null;
          }
        },
      };

      // ==================== CONFIG MANAGER ====================
      const ConfigManager = {
        getFirebaseConfig: () => {
          const stored = localStorage.getItem("firebase_custom_config");
          return stored ? JSON.parse(stored) : null;

        setFirebaseConfig: (config, enabled = true) => {
          localStorage.setItem(

${titleInstruction}

DIRETRIZES DE ESTILO:
- Gêneros: ${config.genres.join(", ")}

${config.elements.map((e) => `- ${e}`).join("\n")}

      // ==================== JSON SCHEMA & VALIDATOR ====================
      const JSONValidator = {
        validate: (jsonString) => {
          try {
            const data = JSON.parse(jsonString);
            if (!data.metadata || !data.chapter || !data.continuity)
              return {
                valid: false,
                error:
                  "Estrutura JSON incompleta. Faltam campos obrigatórios: metadata, chapter ou continuity.",
              };
            if (
              !data.metadata.ai_provider ||
              !data.metadata.model ||
              !data.metadata.plan
            )
              return {
                valid: false,
                error:
                  "Metadata incompleto. É obrigatório informar: ai_provider, model e plan.",
              };
            if (
              !data.chapter.content ||
              typeof data.chapter.content !== "string"
            )
              return {
                valid: false,
                error:
                  "Campo chapter.content é obrigatório e deve ser uma string.",
              };
            if (!data.continuity.summary || !data.continuity.protagonist)
              return {
                valid: false,
                error:
                  "Continuity incompleto. É obrigatório ter summary e protagonist.",
              };
            return { valid: true, data };
          } catch (e) {
            return {
              valid: false,
              error: `JSON inválido: ${e.message}`,
              parseError: true,
            };
          }
        },

        extractJSON: (text) => {
          const jsonMatch = text.match(/\{[\s\S]*\}/);
          if (jsonMatch) return jsonMatch[0];
          return text;
        },

        generateCorrectionPrompt: (originalText, error) => {
          return `ERRO DE FORMATO DETECTADO
A resposta anterior não está no formato JSON correto.
ERRO: ${error}

FORMATO CORRETO OBRIGATÓRIO:
{
  "metadata": { "ai_provider": "...", "model": "...", "plan": "...", "generated_at": "..." },
  "chapter": { "number": 1, "content": "..." },
  "continuity": { "summary": "...", "protagonist": { "name": "...", "age": "...", "level_power": "...", "abilities": [], "current_goal": "..." }, "secondary_characters": [], "worldbuilding": { "current_location": "...", "world_rules": "...", "organizations": [] }, "power_system": { "mechanics": "...", "progression": "..." }, "plot_threads": { "main": "...", "secondary": [] }, "next_chapter_suggestions": [] }
}

RESPOSTA ANTERIOR QUE PRECISA SER CONVERTIDA:
${originalText.substring(0, 500)}...

Agora, reformate sua resposta anterior no formato JSON correto:`;
        },

              parsed = new Function("return " + cleanInput)();

              !parsed.apiKey ||
              !parsed.projectId

                    <div>

                {step === 2 && (
                  <div className="space-y-6 fade-in">
                    <div>
                      <div className="flex items-center justify-between mb-2">
                        <label className="block text-sm font-medium">
                          Elementos da História
                        </label>
                        <button
                          onClick={randomElements}
                          className="px-2 py-1 bg-blue-600 rounded-lg hover:bg-blue-700"
                          title="Aleatório"
                        >
                          🎲
                        </button>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                        {elementOptions.map((element) => (
                          <button
                            key={element}
                            onClick={() => toggleElement(element)}
                            className={`p-3 rounded-lg border transition-all text-left text-sm ${
                              config.elements.includes(element)
                                ? "bg-purple-500/30 border-purple-500"
                                : "bg-black/30 border-gray-700 hover:border-gray-500"
                            }`}
                          >
                            {element}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm font-medium mb-2">
                        Notas Adicionais
                      </label>
                      <div className="space-y-3">
                        <div className="flex gap-2">
                          <input
                            type="text"
                            value={currentNote}
                            onChange={(e) => setCurrentNote(e.target.value)}
                            onKeyPress={(e) => e.key === "Enter" && addNote()}
                            className="flex-1 bg-black/50 border border-gray-700 rounded-lg p-3 text-gray-300"
                            placeholder="Digite e pressione Enter"
                          />
                          <button
                            onClick={addNote}
                            className="bg-purple-600 px-4 py-2 rounded-lg hover:bg-purple-700"
                          >
                            Add
                          </button>
                        </div>

                        {config.notesList.length > 0 && (
                          <div className="space-y-2 mt-4">
                            {config.notesList.map((note, index) => (
                              <div
                                key={index}
                                className="flex gap-2 items-center bg-black/30 p-3 rounded-lg border border-gray-700"
                              >
                                <span className="flex-1 text-sm text-gray-300">
                                  {note}
                                </span>
                                <button
                                  onClick={() => removeNote(index)}
                                  className="text-red-400 hover:text-red-300 px-2"
                                >
                                  ✕
                                </button>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                <div className="flex flex-col sm:flex-row justify-between gap-3 mt-8">
                  <button
                    onClick={() => setStep(Math.max(1, step - 1))}
                    disabled={step === 1}
                    className="glass-effect px-4 md:px-6 py-3 rounded-lg disabled:opacity-50 order-2 sm:order-1"
                  >
                    Anterior
                  </button>
                  {step < 2 ? (
                    <button
                      onClick={() => setStep(step + 1)}
                      className="bg-gradient-to-r from-purple-500 to-pink-500 px-4 md:px-6 py-3 rounded-lg order-1 sm:order-2"
                    >
                      Próximo
                    </button>
                  ) : (
                    <button
                      onClick={handleSubmit}
                      className="bg-gradient-to-r from-green-500 to-emerald-500 px-4 md:px-6 py-3 rounded-lg order-1 sm:order-2"
                    >
                      Criar Light Novel
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ==================== LN MANAGER ====================
      const LNManager = ({ ln, onBack }) => {
        const [view, setView] = useState("main");
        const [selectedChapter, setSelectedChapter] = useState(null);
        const [responseText, setResponseText] = useState("");
        const [editDBText, setEditDBText] = useState("");
        const [validationResult, setValidationResult] = useState(null);

        const copyToClipboard = (text) => {
          navigator.clipboard.writeText(text);
          alert("Copiado para a área de transferência!");
        };

        const handleSaveDBAction = async () => {
          try {
            const parsedDB = JSON.parse(editDBText);
            await StorageManager.updateLN(ln.id, { continuityDB: parsedDB });
            setView("main");
            alert("Banco de dados atualizado!");
          } catch (error) {
            alert("Erro: JSON inválido! Verifique a sintaxe.");
          }
        };

        const handleDelete = async () => {
          if (
            confirm(
              "Tem certeza que deseja deletar esta Light Novel? Ela será removida permanentemente da nuvem.",
            )
          ) {
            await StorageManager.deleteLN(ln.id);
            onBack();
          }
        };

        const handleExport = () => {
          StorageManager.exportLN(ln);
        };

        const getPrompt = () => {
          if (ln.chapters.length === 0) {
            return PromptGenerator.generateInitialPrompt(ln);
          } else {
            return PromptGenerator.generateContinuationPrompt(
              ln,
              ln.chapters.length + 1,
            );
          }
        };

        if (view === "prompt") {
          const prompt = getPrompt();
          return (
            <div className="min-h-screen p-8">
              <div className="max-w-4xl mx-auto">
                <button
                  onClick={() => setView("main")}
                  className="glass-effect px-4 py-2 rounded-lg mb-6 flex items-center gap-2"
                >
                  <Icons.ArrowLeft />
                  Voltar
                </button>
                <div className="glass-effect p-8 rounded-lg">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-2xl font-bold text-purple-300">
                      Prompt - Capítulo {ln.chapters.length + 1}
                    </h2>
                    <button
                      onClick={() => copyToClipboard(prompt)}
                      className="bg-purple-600 px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-purple-700"
                    >
                      <Icons.Copy />
                      Copiar Prompt
                    </button>
                  </div>
                  <div className="bg-black/50 border border-gray-700 rounded-lg p-4 whitespace-pre-wrap text-sm text-gray-300 max-h-[600px] overflow-y-auto">
                    {prompt}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        if (view === "addChapter") {
          const handleValidate = () => {
            const extracted = JSONValidator.extractJSON(responseText);
            const result = JSONValidator.validate(extracted);
            setValidationResult(result);

            if (!result.valid) {
              const prompt = JSONValidator.generateCorrectionPrompt(
                responseText,
                result.error,
              );
              setValidationResult({ ...result, correctionPrompt: prompt });
            }
          };

          const handleAddChapterFinal = async () => {
            if (
              validationResult.data.title &&
              (!ln.title || ln.title.trim() === "")
            ) {
              await StorageManager.updateLN(ln.id, {
                title: validationResult.data.title,
              });
            }

            const chapterData = {
              content: validationResult.data.chapter.content,
              metadata: validationResult.data.metadata,
              continuity: validationResult.data.continuity,
            };

            await StorageManager.addChapter(ln.id, chapterData);
            setResponseText("");
            setValidationResult(null);
            setView("main");
            alert("Capítulo adicionado com sucesso!");
          };

          return (
            <div className="min-h-screen p-8">
              <div className="max-w-5xl mx-auto">
                <button
                  onClick={() => setView("main")}
                  className="glass-effect px-4 py-2 rounded-lg mb-6 flex items-center gap-2"
                >
                  <Icons.ArrowLeft />
                  Voltar
                </button>

                <div className="glass-effect p-8 rounded-lg">
                  <h2 className="text-2xl font-bold text-purple-300 mb-4">
                    Adicionar Capítulo {ln.chapters.length + 1}
                  </h2>

                  {!validationResult ? (
                    <>
                      <textarea
                        value={responseText}
                        onChange={(e) => setResponseText(e.target.value)}
                        className="w-full h-96 bg-black/50 border border-gray-700 rounded-lg p-4 text-gray-300 mb-4 font-mono text-sm"
                        placeholder="Cole a resposta JSON completa da IA aqui..."
                      />
                      <div className="flex gap-3">
                        <button
                          onClick={handleValidate}
                          disabled={!responseText.trim()}
                          className="bg-purple-600 px-6 py-3 rounded-lg hover:bg-purple-700 disabled:opacity-50"
                        >
                          Validar JSON
                        </button>
                        <button
                          onClick={() => setView("main")}
                          className="glass-effect px-6 py-3 rounded-lg"
                        >
                          Cancelar
                        </button>
                      </div>
                    </>
                  ) : validationResult.valid ? (
                    <div className="space-y-6 fade-in">
                      <div className="bg-green-500/10 border border-green-500/30 rounded-lg p-6">
                        <span className="text-green-400 font-semibold text-lg">
                          JSON Válido!
                        </span>
                      </div>
                      <div className="flex gap-3">
                        <button
                          onClick={handleAddChapterFinal}
                          className="bg-gradient-to-r from-green-500 to-emerald-500 px-8 py-3 rounded-lg hover:opacity-90 font-semibold"
                        >
                          Salvar Capítulo
                        </button>
                        <button
                          onClick={() => {
                            setValidationResult(null);
                            setResponseText("");
                          }}
                          className="glass-effect px-6 py-3 rounded-lg"
                        >
                          Descartar
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div className="space-y-6 fade-in">
                      <div className="bg-red-500/10 border border-red-500/30 rounded-lg p-6">
                        <span className="text-red-400 font-semibold text-lg">
                          Formato Inválido: {validationResult.error}
                        </span>
                      </div>
                      <div className="glass-effect p-6 rounded-lg">
                        <div className="flex items-center justify-between mb-4">
                          <h3 className="text-lg font-semibold text-purple-300">
                            Prompt de Correção
                          </h3>
                          <button
                            onClick={() =>
                              copyToClipboard(
                                validationResult.correctionPrompt || "",
                              )
                            }
                            className="bg-purple-600 px-4 py-2 rounded-lg text-sm"
                          >
                            Copiar Prompt
                          </button>
                        </div>
                        <div className="bg-black/50 border border-gray-700 rounded-lg p-4 max-h-96 overflow-y-auto">
                          <pre className="text-xs text-gray-300 whitespace-pre-wrap font-mono">
                            {validationResult.correctionPrompt}
                          </pre>
                        </div>
                      </div>
                      <div className="flex gap-3">
                        <button
                          onClick={() => setValidationResult(null)}
                          className="bg-blue-600 px-6 py-3 rounded-lg hover:bg-blue-700"
                        >
                          Tentar Novamente
                        </button>
                        <button
                          onClick={() => setView("main")}
                          className="glass-effect px-6 py-3 rounded-lg"
                        >
                          Cancelar
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        }

        if (view === "editDB") {
          return (
            <div className="min-h-screen p-8">
              <div className="max-w-4xl mx-auto">
                <button
                  onClick={() => setView("main")}
                  className="glass-effect px-4 py-2 rounded-lg mb-6 flex items-center gap-2"
                >
                  <Icons.ArrowLeft />
                  Voltar
                </button>
                <div className="glass-effect p-8 rounded-lg">
                  <h2 className="text-2xl font-bold text-purple-300 mb-4">
                    Editar Banco de Dados de Continuidade
                  </h2>
                  <textarea
                    value={editDBText}
                    onChange={(e) => setEditDBText(e.target.value)}
                    className="w-full h-96 bg-black/50 border border-gray-700 rounded-lg p-4 text-gray-300 mb-4 font-mono text-sm"
                  />
                  <div className="flex gap-3">
                    <button
                      onClick={handleSaveDBAction}
                      className="bg-green-600 px-6 py-3 rounded-lg hover:bg-green-700"
                    >
                      Salvar
                    </button>
                    <button
                      onClick={() => setView("main")}
                      className="glass-effect px-6 py-3 rounded-lg"
                    >
                      Cancelar
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        if (view === "read") {
          return (
            <Reader
              ln={ln}
              onBack={() => setView("main")}
              initialChapter={selectedChapter}
            />
          );
        }

        return (
          <div className="min-h-screen p-8">
            <div className="max-w-6xl mx-auto">
              <button
                onClick={onBack}
                className="glass-effect px-4 py-2 rounded-lg mb-6 flex items-center gap-2"
              >
                <Icons.ArrowLeft />
                Dashboard
              </button>

              <div className="glass-effect p-8 rounded-lg mb-6">
                <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-4 mb-6">
                  <div>
                    <h1 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">
                      {ln.title}
                    </h1>
                    <p className="text-gray-400 mt-2">
                      {ln.genres.join(" • ")}
                    </p>
                  </div>
                  <div className="flex flex-wrap gap-2">
                    <button
                      onClick={handleExport}
                      className="glass-effect px-3 py-2 rounded-lg flex items-center gap-2 hover:bg-white/10 transition-colors"
                      title="Exportar"
                    >
                      <Icons.Download />
                      <span className="hidden sm:inline">Exportar</span>
                    </button>
                    <button
                      onClick={handleDelete}
                      className="glass-effect px-3 py-2 rounded-lg flex items-center gap-2 hover:bg-red-500/20 text-red-400 transition-colors"
                      title="Deletar"
                    >
                      <Icons.Trash />
                      <span className="hidden sm:inline">Deletar</span>
                    </button>
                    <button
                      onClick={() => {
                        const dbText =
                          typeof ln.continuityDB === "string"
                            ? ln.continuityDB
                            : JSON.stringify(ln.continuityDB, null, 2);
                        setEditDBText(dbText);
                        setView("editDB");
                      }}
                      disabled={!ln.continuityDB}
                      className="glass-effect px-3 py-2 rounded-lg flex items-center gap-2 disabled:opacity-50 hover:bg-white/10 transition-colors"
                    >
                      <Icons.Edit />
                      <span className="hidden sm:inline">Editar BD</span>
                    </button>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                  <div className="bg-purple-500/20 p-4 rounded-lg border border-purple-500/30">
                    <div className="text-sm text-gray-400 mb-2">📚 Gêneros</div>
                    <div className="flex flex-wrap gap-2">
                      {/* Gêneros sem cortes e sem limite */}
                      {ln.genres?.map((genre, idx) => (
                        <span
                          key={idx}
                          className="text-xs bg-purple-500/30 text-purple-200 px-2 py-1 rounded-full"
                        >
                          {genre}
                        </span>
                      ))}
                    </div>
                  </div>
                  <div className="bg-pink-500/20 p-4 rounded-lg border border-pink-500/30">
                    <div className="text-sm text-gray-400 mb-2">
                      ⭐ Elementos
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {/* Elementos sem cortes e sem limite */}
                      {ln.elements?.map((element, idx) => (
                        <span
                          key={idx}
                          className="text-xs bg-pink-500/30 text-pink-200 px-2 py-1 rounded-full"
                        >
                          {element}
                        </span>
                      ))}
                    </div>
                  </div>
                  {/* Notas Adicionais */}
                  {ln.notesList && ln.notesList.length > 0 && (
                    <div className="bg-blue-500/20 p-4 rounded-lg border border-blue-500/30 md:col-span-2">
                      <div className="text-sm text-gray-400 mb-2">
                        📝 Notas Adicionais
                      </div>
                      <div className="flex flex-wrap gap-2">
                        {ln.notesList.map((note, idx) => (
                          <span
                            key={idx}
                            className="text-xs bg-blue-500/30 text-blue-200 px-2 py-1 rounded-full"
                          >
                            {note}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                <div className="grid grid-cols-2 gap-6 mb-6">
                  <div className="bg-green-500/20 p-4 rounded-lg border border-green-500/30">
                    <div className="text-3xl font-bold text-green-300">
                      {ln.chapters.length}
                    </div>
                    <div className="text-sm text-gray-400 mt-1">Capítulos</div>
                  </div>
                  <div className="bg-amber-500/20 p-4 rounded-lg border border-amber-500/30">
                    <div className="text-3xl font-bold text-amber-300">
                      {ln.lastReadChapter || "-"}
                    </div>
                    <div className="text-sm text-gray-400 mt-1">
                      Última Leitura
                    </div>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6 mb-6">
                <button
                  onClick={() => setView("prompt")}
                  className="glass-effect p-4 md:p-6 rounded-lg hover-glow transition-all text-left"
                >
                  <div className="flex items-center gap-3 mb-2">
                    <Icons.Copy />
                    <h3 className="text-lg md:text-xl font-semibold">
                      Gerar Prompt
                    </h3>
                  </div>
                  <p className="text-gray-400 text-xs md:text-sm">
                    Copie o prompt para o cap {ln.chapters.length + 1}
                  </p>
                </button>

                <button
                  onClick={() => setView("addChapter")}
                  className="glass-effect p-4 md:p-6 rounded-lg hover-glow transition-all text-left"
                >
                  <div className="flex items-center gap-3 mb-2">
                    <Icons.Plus />
                    <h3 className="text-lg md:text-xl font-semibold">
                      Adicionar Capítulo
                    </h3>
                  </div>
                  <p className="text-gray-400 text-xs md:text-sm">
                    Cole a resposta JSON
                  </p>
                </button>

                <button
                  onClick={() => {
                    setSelectedChapter(null);
                    setView("read");
                  }}
                  disabled={ln.chapters.length === 0}
                  className="glass-effect p-4 md:p-6 rounded-lg hover-glow transition-all text-left disabled:opacity-50"
                >
                  <div className="flex items-center gap-3 mb-2">
                    <Icons.BookOpen />
                    <h3 className="text-lg md:text-xl font-semibold">
                      Modo Leitura
                    </h3>
                  </div>
                  <p className="text-gray-400 text-xs md:text-sm">
                    {ln.chapters.length === 0
                      ? "Adicione capítulos primeiro"
                      : "Ler seus capítulos"}
                  </p>
                </button>
              </div>

              {ln.chapters.length > 0 && (
                <div className="glass-effect p-8 rounded-lg">
                  <h2 className="text-2xl font-bold text-purple-300 mb-6">
                    Capítulos
                  </h2>
                  <div className="space-y-3">
                    {ln.chapters.map((chapter, idx) => (
                      <div
                        key={idx}
                        className="bg-black/30 p-4 rounded-lg border border-gray-700 hover:border-purple-500/50 transition-all cursor-pointer"
                        onClick={() => {
                          setSelectedChapter(chapter);
                          setView("read");
                        }}
                      >
                        <div className="flex items-start justify-between">
                          <div>
                            <div className="flex items-center gap-2 mb-2">
                              <h3 className="font-semibold text-lg">
                                Capítulo {chapter.number}
                              </h3>
                              {ln.lastReadChapter === chapter.number && (
                                <span className="text-xs bg-green-500/20 text-green-300 px-2 py-1 rounded-full">
                                  📖 Última leitura
                                </span>
                              )}
                            </div>
                            <div className="text-xs text-gray-500 mb-2">
                              Gerado por:{" "}
                              <span className="text-purple-300 font-medium">
                                {chapter.metadata?.ai_provider} (
                                {chapter.metadata?.model})
                              </span>
                            </div>
                          </div>
                          <Icons.BookOpen />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      // ==================== READER ====================
      const Reader = ({ ln, onBack, initialChapter = null }) => {
        const [currentChapterIndex, setCurrentChapterIndex] = useState(() => {
          if (initialChapter) {
            const index = ln.chapters.findIndex(
              (ch) => ch.number === initialChapter.number,
            );
            return index !== -1 ? index : 0;
          }
          if (ln.lastReadChapter) {
            const index = ln.chapters.findIndex(
              (ch) => ch.number === ln.lastReadChapter,
            );
            if (index !== -1) return index;
          }
          return 0;
        });

        const [settings, setSettings] = useState(() =>
          ConfigManager.getReaderSettings(),
        );
        const [showSettings, setShowSettings] = useState(false);
        const contentRef = React.useRef(null);

        const currentChapter = ln.chapters[currentChapterIndex];

        useEffect(() => {
          if (currentChapter) {
            StorageManager.updateLN(ln.id, {
              lastReadChapter: currentChapter.number,
            });
          }
        }, [currentChapter, ln.id]);

        useEffect(() => {
          ConfigManager.setReaderSettings(settings);
        }, [settings]);

        useEffect(() => {
          if (currentChapter && contentRef.current) {
            const savedScroll = ConfigManager.getScrollPosition(
              ln.id,
              currentChapter.number,
            );
            setTimeout(() => {
              if (contentRef.current) {
                if (savedScroll > 0) {
                  const maxScroll =
                    contentRef.current.scrollHeight -
                    contentRef.current.clientHeight;
                  contentRef.current.scrollTop =
                    maxScroll * (savedScroll / 100);
                } else {
                  contentRef.current.scrollTop = 0;
                }
              }
            }, 100);
          }
        }, [currentChapter, ln.id]);

        const handleScroll = () => {
          if (currentChapter && contentRef.current) {
            const scrollPercentage =
              (contentRef.current.scrollTop /
                (contentRef.current.scrollHeight -
                  contentRef.current.clientHeight)) *
              100;
            ConfigManager.setScrollPosition(
              ln.id,
              currentChapter.number,
              scrollPercentage,
            );
          }
        };

        const themes = {
          dark: { bg: "bg-gray-900", text: "text-gray-100" },
          sepia: { bg: "bg-amber-50", text: "text-amber-900" },
          black: { bg: "bg-black", text: "text-gray-300" },
        };

        const fonts = {
          serif: "font-serif",
          sans: "font-sans",
          mono: "font-mono",
        };

        return (
          <div
            ref={contentRef}
            onScroll={handleScroll}
            className={`min-h-screen max-h-screen overflow-y-auto ${themes[settings.theme].bg} transition-colors`}
          >
            <div className="sticky top-0 glass-effect border-b border-gray-700 z-10">
              <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                <button
                  onClick={onBack}
                  className="px-4 py-2 rounded-lg hover:bg-white/10 transition-colors flex items-center gap-2"
                >
                  <Icons.ArrowLeft />
                  Voltar
                </button>
                <div className="text-center">
                  <div className="text-sm text-gray-400">{ln.title}</div>
                  <div className="font-semibold">
                    Capítulo {currentChapter.number}
                  </div>
                </div>
                <button
                  onClick={() => setShowSettings(!showSettings)}
                  className="px-4 py-2 rounded-lg hover:bg-white/10 transition-colors"
                >
                  <Icons.Settings />
                </button>
              </div>
              {showSettings && (
                <div className="border-t border-gray-700 p-6 fade-in">
                  <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                      <label className="block text-sm mb-2">
                        Tamanho da Fonte: {settings.fontSize}px
                      </label>
                      <input
                        type="range"
                        min="14"
                        max="28"
                        value={settings.fontSize}
                        onChange={(e) =>
                          setSettings({
                            ...settings,
                            fontSize: parseInt(e.target.value),
                          })
                        }
                        className="w-full"
                      />
                    </div>
                    <div>
                      <label className="block text-sm mb-2">
                        Espaçamento: {settings.lineHeight}
                      </label>
                      <input
                        type="range"
                        min="1.4"
                        max="2.2"
                        step="0.1"
                        value={settings.lineHeight}
                        onChange={(e) =>
                          setSettings({
                            ...settings,
                            lineHeight: parseFloat(e.target.value),
                          })
                        }
                        className="w-full"
                      />
                    </div>
                    <div>
                      <label className="block text-sm mb-2">Tema</label>
                      <select
                        value={settings.theme}
                        onChange={(e) =>
                          setSettings({ ...settings, theme: e.target.value })
                        }
                        className="w-full bg-black/50 border border-gray-700 rounded-lg p-2"
                      >
                        <option value="dark">Escuro</option>
                        <option value="sepia">Sépia</option>
                        <option value="black">Preto Puro</option>
                      </select>
                    </div>
                  </div>
                </div>
              )}
            </div>

            <div className="max-w-4xl mx-auto px-6 py-12">
              <div
                className={`${themes[settings.theme].text} ${fonts[settings.fontFamily]} whitespace-pre-wrap`}
                style={{
                  fontSize: `${settings.fontSize}px`,
                  lineHeight: settings.lineHeight,
                }}
              >
                {currentChapter.content}
              </div>
            </div>

            <div className="sticky bottom-0 glass-effect border-t border-gray-700">
              <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                <button
                  onClick={() =>
                    setCurrentChapterIndex(Math.max(0, currentChapterIndex - 1))
                  }
                  disabled={currentChapterIndex === 0}
                  className="px-6 py-2 rounded-lg hover:bg-white/10 disabled:opacity-50 transition-colors"
                >
                  ← Anterior
                </button>
                <div className="text-sm text-gray-400">
                  {currentChapterIndex + 1} de {ln.chapters.length}
                </div>
                <button
                  onClick={() =>
                    setCurrentChapterIndex(
                      Math.min(ln.chapters.length - 1, currentChapterIndex + 1),
                    )
                  }
                  disabled={currentChapterIndex === ln.chapters.length - 1}
                  className="px-6 py-2 rounded-lg hover:bg-white/10 disabled:opacity-50 transition-colors"
                >
                  Próximo →
                </button>
              </div>
            </div>
          </div>
        );
      };

      // ==================== MAIN APP ====================
      const App = () => {
        const [currentView, setCurrentView] = useState("dashboard");
        const [selectedLN, setSelectedLN] = useState(null);
        const [deferredPrompt, setDeferredPrompt] = useState(null);

        // App state
        const [user, setUser] = useState(null);
        const [lns, setLNs] = useState([]);
        const [loading, setLoading] = useState(true);
        const [firebaseReady, setFirebaseReady] = useState(false);

        // Config state
        const [needsConfig, setNeedsConfig] = useState(false);
        const [showConfigModal, setShowConfigModal] = useState(false);
        const [isStandalone, setIsStandalone] = useState(false);

        useEffect(() => {
          const initFirebase = async () => {
            while (!window.FirebaseAPI) {
              await new Promise((r) => setTimeout(r, 50));
            }

            let firebaseConfig = null;
            let canvasMode = false;

            // 1. Tenta usar as credenciais automáticas (dentro do Canvas)
            if (typeof __firebase_config !== "undefined" && __firebase_config) {
              firebaseConfig = JSON.parse(__firebase_config);
              appId =
                typeof __app_id !== "undefined" ? __app_id : "default-app-id";
              canvasMode = true;
            }
            // 2. Se não estiver no Canvas (ex: GitHub Pages), busca as credenciais no localStorage
            else {
              setIsStandalone(true);
              const storedConfig = ConfigManager.getFirebaseConfig();
              if (storedConfig && storedConfig.enabled && storedConfig.config) {
                firebaseConfig = storedConfig.config;
                appId = firebaseConfig.projectId || "standalone-app";
              }
            }

            if (!firebaseConfig) {
              setNeedsConfig(true);
              setLoading(false);
              return;
            }

            try {
              const app =
                window.FirebaseAPI.getApps().length === 0
                  ? window.FirebaseAPI.initializeApp(firebaseConfig)
                  : window.FirebaseAPI.getApp();

              auth = window.FirebaseAPI.getAuth(app);
              db = window.FirebaseAPI.getFirestore(app);

              const unsubscribeAuth = window.FirebaseAPI.onAuthStateChanged(
                auth,
                (u) => {
                  setUser(u);
                  setFirebaseReady(true);
                  setNeedsConfig(false);
                },
              );

              // Se estiver no canvas com login automático
              if (canvasMode) {
                if (
                  typeof __initial_auth_token !== "undefined" &&
                  __initial_auth_token
                ) {
                  await window.FirebaseAPI.signInWithCustomToken(
                    auth,
                    __initial_auth_token,
                  );
                } else {
                  await window.FirebaseAPI.signInAnonymously(auth);
                }
              } else {
                // Se estiver fora do Canvas, aguarda onAuthStateChanged. Se não tiver usuário, cria anônimo como fallback.
                // Mas se o usuário quiser, pode logar com Google depois.
                const currentUser = auth.currentUser;
                if (!currentUser) {
                  await window.FirebaseAPI.signInAnonymously(auth);
                }
              }

              return () => unsubscribeAuth();
            } catch (error) {
              console.error("Erro ao inicializar Firebase:", error);
              setNeedsConfig(true);
              setLoading(false);
            }
          };
          initFirebase();
        }, []);

        useEffect(() => {
          if (!user || !firebaseReady) return;

          // IMPORTANTE: Mesmo em modo standalone, mantemos a mesma hierarquia de diretório recomendada pelo sistema
          const lnRef = window.FirebaseAPI.collection(
            db,
            "artifacts",
            appId,
            "users",
            user.uid,
            "light_novels",
          );

          const unsubscribeDB = window.FirebaseAPI.onSnapshot(
            lnRef,
            (snapshot) => {
              const data = [];
              snapshot.forEach((doc) => data.push(doc.data()));
              data.sort(
                (a, b) => new Date(b.createdAt) - new Date(a.createdAt),
              );
              setLNs(data);
              setLoading(false);
            },
            (error) => {
              console.error("Firestore error:", error);
              setLoading(false);
            },
          );

          return () => unsubscribeDB();
        }, [user, firebaseReady]);

        // PWA Install Prompt & Service Worker Registration
        useEffect(() => {
          const handleBeforeInstallPrompt = (e) => {
            e.preventDefault(); // Impede o mini-infobar padrão de aparecer
            setDeferredPrompt(e);
          };
          window.addEventListener(
            "beforeinstallprompt",
            handleBeforeInstallPrompt,
          );

          if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
              navigator.serviceWorker
                .register("sw.js")
                .catch((err) => console.log("SW falhou:", err));
            });
          }

          return () =>
            window.removeEventListener(
              "beforeinstallprompt",
              handleBeforeInstallPrompt,
            );
        }, []);

        const handleInstallApp = async () => {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === "accepted") {
              setDeferredPrompt(null);
            }
          }
        };

        const activeLN = selectedLN
          ? lns.find((l) => l.id === selectedLN.id) || selectedLN
          : null;

        return (
          <>
            {currentView === "dashboard" && (
              <Dashboard
                lns={lns}
                loading={loading}
                user={user}
                ready={firebaseReady}
                needsConfig={needsConfig}
                isStandalone={isStandalone}
                onOpenConfig={() => setShowConfigModal(true)}
                onCreateNew={() => setCurrentView("create")}
                onSelectLN={(ln) => {
                  setSelectedLN(ln);
                  setCurrentView("manager");
                }}
                deferredPrompt={deferredPrompt}
                onInstall={handleInstallApp}
              />
            )}
            {currentView === "create" && (
              <CreationForm
                onBack={() => setCurrentView("dashboard")}
                onComplete={(ln) => {
                  setSelectedLN(ln);
                  setCurrentView("manager");
                }}
              />
            )}
            {currentView === "manager" && activeLN && (
              <LNManager
                ln={activeLN}
                onBack={() => {
                  setSelectedLN(null);
                  setCurrentView("dashboard");
                }}
              />
            )}

            {showConfigModal && (
              <FirebaseConfigModal onClose={() => setShowConfigModal(false)} />
            )}
          </>
        );
      };

      // Render
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
