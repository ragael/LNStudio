<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="canvas192" width="192" height="192"></canvas>
<canvas id="canvas512" width="512" height="512"></canvas>
<script>
// SVG do favicon
const svgData = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="48" fill="#8B5CF6"/>
  <g transform="translate(25, 20)">
    <rect x="0" y="0" width="50" height="60" rx="3" fill="#1F2937"/>
    <rect x="2" y="2" width="46" height="56" rx="2" fill="#374151"/>
    <rect x="8" y="5" width="34" height="50" fill="#F9FAFB"/>
    <line x1="25" y1="5" x2="25" y2="55" stroke="#D1D5DB" stroke-width="1"/>
    <line x1="12" y1="15" x2="21" y2="15" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="20" x2="21" y2="20" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="25" x2="21" y2="25" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="29" y1="15" x2="38" y2="15" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="29" y1="20" x2="38" y2="20" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="29" y1="25" x2="38" y2="25" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
    <g transform="translate(35, 35)">
      <path d="M 0,-6 L 1.5,-1.5 L 6,0 L 1.5,1.5 L 0,6 L -1.5,1.5 L -6,0 L -1.5,-1.5 Z" fill="#EC4899" opacity="0.9"/>
      <circle cx="0" cy="0" r="2" fill="#FFF" opacity="0.8"/>
    </g>
  </g>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.5"/>
</svg>`;

function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const blob = new Blob([svgData], {type: 'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  
  img.onload = function() {
    ctx.drawImage(img, 0, 0, size, size);
    URL.revokeObjectURL(url);
    
    canvas.toBlob(function(blob) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'icon-' + size + '.png';
      a.click();
    });
  };
  
  img.src = url;
}

drawIcon(document.getElementById('canvas192'), 192);
setTimeout(() => drawIcon(document.getElementById('canvas512'), 512), 1000);
</script>
<p>Icons will download automatically...</p>
</body>
</html>
