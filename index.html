    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==================== COVER GENERATOR ====================
        const CoverGenerator = {
            generatePrompt: (ln) => {
                const genres = ln.genres.slice(0, 3).join(', ');
                const protagonist = ln.continuityDB?.protagonist?.name || 'hero';
                const setting = ln.continuityDB?.worldbuilding?.current_location || 'fantasy world';
                
                const styleMap = {
                    'Isekai': 'anime fantasy illustration',
                    'Ficção Científica': 'sci-fi digital art',
                    'Cyberpunk': 'cyberpunk neon style',
                    'Horror': 'dark horror manga style',
                    'Romance': 'beautiful anime romance art'
                };
                
                const style = styleMap[ln.genres[0]] || 'light novel cover art';
                
                return `${style}, ${genres} light novel cover, featuring ${protagonist} in ${setting}, professional book cover, detailed, vibrant colors, trending on artstation`;
            },
            
            generateCoverBase64: async (ln) => {
                const prompt = CoverGenerator.generatePrompt(ln);
                
                try {
                    // Using Puter.js AI - FREE API
                    const imageUrl = await puter.ai.txt2img(prompt, {
                        model: 'flux',
                        width: 512,
                        height: 768
                    });
                    
                    // Download image and convert to Base64
                    const response = await fetch(imageUrl);
                    const blob = await response.blob();
                    
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(blob);
                    });
                } catch (error) {
                    console.error('Puter.js image generation failed:', error);
                    throw error;
                }
            },
            
            downloadCover: (base64Data, filename) => {
                const a = document.createElement('a');
                a.href = base64Data;
                a.download = filename;
                a.click();
            }
        };

        // ==================== PWA INSTALLER ====================
        let deferredPrompt;
        const PWAInstaller = {
            init: () => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    PWAInstaller.showInstallButton();
                });

                window.addEventListener('appinstalled', () => {
                    console.log('PWA installed successfully');
                    deferredPrompt = null;
                });
            },
            
            showInstallButton: () => {
                // Will be shown in Dashboard
                const event = new CustomEvent('pwa-installable');
                window.dispatchEvent(event);
            },
            
            install: async () => {
                if (!deferredPrompt) {
                    alert('App já está instalado ou navegador não suporta instalação.');
                    return;
                }
                
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response: ${outcome}`);
                deferredPrompt = null;
            }
        };

        // ==================== INDEXEDDB MANAGER ====================
        const DB_NAME = 'LightNovelManagerDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'lightNovels';

        const IndexedDBManager = {
            db: null,
            
            init: async () => {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        IndexedDBManager.db = request.result;
                        resolve(request.result);
                    };
                    
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            const objectStore = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                            objectStore.createIndex('title', 'title', { unique: false });
                            objectStore.createIndex('createdAt', 'createdAt', { unique: false });
                        }
                    };
                });
            },
            
            getLNs: async () => {
                return new Promise((resolve, reject) => {
                    const transaction = IndexedDBManager.db.transaction([STORE_NAME], 'readonly');
                    const objectStore = transaction.objectStore(STORE_NAME);
                    const request = objectStore.getAll();
                    
                    request.onsuccess = () => resolve(request.result || []);
                    request.onerror = () => reject(request.error);
                });
            },
            
            saveLN: async (ln) => {
                return new Promise((resolve, reject) => {
                    const transaction = IndexedDBManager.db.transaction([STORE_NAME], 'readwrite');
                    const objectStore = transaction.objectStore(STORE_NAME);
                    const request = objectStore.put(ln);
                    
                    request.onsuccess = () => resolve(ln);
                    request.onerror = () => reject(request.error);
                });
            },
            
            deleteLN: async (id) => {
                return new Promise((resolve, reject) => {
                    const transaction = IndexedDBManager.db.transaction([STORE_NAME], 'readwrite');
                    const objectStore = transaction.objectStore(STORE_NAME);
                    const request = objectStore.delete(id);
                    
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },
            
            // Migration from localStorage
            migrateFromLocalStorage: async () => {
                try {
                    const oldData = localStorage.getItem('lightNovels');
                    if (oldData) {
                        const lns = JSON.parse(oldData);
                        for (const ln of lns) {
                            await IndexedDBManager.saveLN(ln);
                        }
                        console.log('Migration completed:', lns.length, 'light novels migrated');
                        // Keep localStorage as backup for now
                        // localStorage.removeItem('lightNovels');
                    }
                } catch (error) {
                    console.error('Migration error:', error);
                }
            }
        };

        // ==================== STORAGE MANAGER (IndexedDB wrapper) ====================
        const StorageManager = {
            initialized: false,
            
            ensureInit: async () => {
                if (!StorageManager.initialized) {
                    await IndexedDBManager.init();
                    await IndexedDBManager.migrateFromLocalStorage();
                    StorageManager.initialized = true;
                }
            },
            
            getLNs: async () => {
                await StorageManager.ensureInit();
                return await IndexedDBManager.getLNs();
            },
            
            createLN: async (ln) => {
                await StorageManager.ensureInit();
                const newLN = {
                    ...ln,
                    id: Date.now().toString(),
                    createdAt: new Date().toISOString(),
                    chapters: [],
                    continuityDB: null,
                    coverBase64: null, // Changed from coverUrl to coverBase64
                    lastReadChapter: null // Track last read chapter
                };
                return await IndexedDBManager.saveLN(newLN);
            },
            
            updateLN: async (id, updates) => {
                await StorageManager.ensureInit();
                const lns = await IndexedDBManager.getLNs();
                const ln = lns.find(l => l.id === id);
                if (ln) {
                    const updated = { ...ln, ...updates };
                    return await IndexedDBManager.saveLN(updated);
                }
                return null;
            },
            
            deleteLN: async (id) => {
                await StorageManager.ensureInit();
                return await IndexedDBManager.deleteLN(id);
            },
            
            addChapter: async (lnId, chapterData) => {
                await StorageManager.ensureInit();
                const lns = await IndexedDBManager.getLNs();
                const ln = lns.find(l => l.id === lnId);
                if (ln) {
                    const chapter = {
                        number: ln.chapters.length + 1,
                        content: chapterData.content,
                        metadata: chapterData.metadata || {
                            ai_provider: 'Unknown',
                            model: 'Unknown',
                            plan: 'Unknown',
                            generated_at: new Date().toISOString()
                        },
                        addedAt: new Date().toISOString()
                    };
                    ln.chapters.push(chapter);
                    ln.continuityDB = chapterData.continuity;
                    return await IndexedDBManager.saveLN(ln);
                }
                return null;
            },
            
            exportLN: async (id) => {
                await StorageManager.ensureInit();
                const lns = await IndexedDBManager.getLNs();
                const ln = lns.find(l => l.id === id);
                if (ln) {
                    const dataStr = JSON.stringify(ln, null, 2);
                    const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                    const exportFileDefaultName = `${ln.title.replace(/\s+/g, '_')}_backup.json`;
                    const linkElement = document.createElement('a');
                    linkElement.setAttribute('href', dataUri);
                    linkElement.setAttribute('download', exportFileDefaultName);
                    linkElement.click();
                }
            },
            
            importLN: async (jsonData) => {
                await StorageManager.ensureInit();
                try {
                    const ln = JSON.parse(jsonData);
                    ln.id = Date.now().toString();
                    ln.createdAt = new Date().toISOString();
                    return await IndexedDBManager.saveLN(ln);
                } catch (e) {
                    console.error('Import error:', e);
                    return null;
                }
            }
        };

SUA MISSÃO:

        const JSONValidator = {
            validate: (jsonString) => {
                try {
                    const data = JSON.parse(jsonString);
                    
                    // Validar estrutura básica
                    if (!data.metadata || !data.chapter || !data.continuity) {
                        return { 
                            valid: false, 
                            error: 'Estrutura JSON incompleta. Faltam campos obrigatórios: metadata, chapter ou continuity.' 
                        };
                    }
                    
                    // Validar metadata
                    if (!data.metadata.ai_provider || !data.metadata.model || !data.metadata.plan) {
                        return { 
                            valid: false, 
                            error: 'Metadata incompleto. É obrigatório informar: ai_provider, model e plan.' 
                        };
                    }
                    
                    // Validar chapter
                    if (!data.chapter.content || typeof data.chapter.content !== 'string') {
                        return { 
                            valid: false, 
                            error: 'Campo chapter.content é obrigatório e deve ser uma string.' 
                        };
                    }
                    
                    // Validar continuity básico
                    if (!data.continuity.summary || !data.continuity.protagonist) {
                        return { 
                            valid: false, 
                            error: 'Continuity incompleto. É obrigatório ter summary e protagonist.' 
                        };
                    }
                    
                    return { valid: true, data };
                } catch (e) {
                    return { 
                        valid: false, 
                        error: `JSON inválido: ${e.message}`,
                        parseError: true
                    };
                }
            },
            
            extractJSON: (text) => {
                // Tentar extrair JSON de markdown code blocks
                const codeBlockMatch = text.match(/```(?:json)?\s*(\{[\s\S]*?\})\s*```/);
                if (codeBlockMatch) {
                    return codeBlockMatch[1];
                }
                
                // Tentar encontrar JSON puro
                const jsonMatch = text.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    return jsonMatch[0];
                }
                
                return text;
            },

        // ==================== LN MANAGER ====================

            const [selectedChapter, setSelectedChapter] = useState(null);

            // Estados para coverGen

            const [coverPreviewBase64, setCoverPreviewBase64] = useState(null);

            const refreshLN = async () => {
                const lns = await StorageManager.getLNs();
                const updated = lns.find(l => l.id === currentLN.id);
                if (updated) setCurrentLN(updated);
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                alert('Copiado para a área de transferência!');
            };

            const handleAddChapter = () => {
                const parsed = ResponseParser.parse(responseText);
                StorageManager.addChapter(currentLN.id, parsed);
                setResponseText('');
                refreshLN();
                setView('main');
                alert('Capítulo adicionado com sucesso!');
            };

            const handleSaveDB = () => {
                StorageManager.updateLN(currentLN.id, { continuityDB: editDBText });
                refreshLN();
                setView('main');
                alert('Banco de dados atualizado!');
            };

            const getPrompt = () => {
                if (currentLN.chapters.length === 0) {
                    return PromptGenerator.generateInitialPrompt(currentLN);
                } else {
                    return PromptGenerator.generateContinuationPrompt(
                        currentLN.continuityDB,
                        currentLN.chapters.length + 1
                    );
                }
            };

                const prompt = getPrompt();
                return (

            if (view === 'addChapter') {
                const handleValidate = () => {
                    const extracted = JSONValidator.extractJSON(responseText);
                    const result = JSONValidator.validate(extracted);
                    setValidationResult(result);
                    
                    if (!result.valid) {
                        const prompt = JSONValidator.generateCorrectionPrompt(responseText, result.error);
                        // Armazenar o prompt no validationResult para uso posterior
                        setValidationResult({...result, correctionPrompt: prompt});
                    }

                const handleAddChapterFinal = async () => {
                    const chapterData = {
                        content: validationResult.data.chapter.content,
                        metadata: validationResult.data.metadata,
                        continuity: validationResult.data.continuity

                    await StorageManager.addChapter(currentLN.id, chapterData);
                    setResponseText('');
                    setValidationResult(null);
                    await refreshLN();
                    setView('main');

}'

                                        Salvar
                                    </button>
                                    <button
                                        onClick={() => setView('main')}
                                        className="glass-effect px-6 py-3 rounded-lg"
                                    >
                                        Cancelar
                                    </button>
                                </div>
                            </div>
                        </div>

                return <Reader ln={currentLN} onBack={() => setView('main')} initialChapter={selectedChapter} />;
            }

                const handleGenerateCover = async () => {
                    setGeneratingCover(true);
                    try {
                        const base64 = await CoverGenerator.generateCoverBase64(currentLN);
                        setCoverPreviewBase64(base64);
                    } catch (error) {
                        alert('Erro ao gerar capa. Verifique se está conectado à internet.');
                        console.error(error);
                    } finally {
                        setGeneratingCover(false);
                    }
                };

                const handleSaveCover = async () => {
                    await StorageManager.updateLN(currentLN.id, { coverBase64: coverPreviewBase64 });
                    await refreshLN();
                    setView('main');
                    alert('Capa salva com sucesso!');
                };

                const handleDownloadCover = () => {
                    CoverGenerator.downloadCover(coverPreviewBase64, `${currentLN.title}-cover.png`);
                };

                return (
                    <div className="min-h-screen p-8">
                        <div className="max-w-4xl mx-auto">

                                onClick={() => setView('main')}
                                className="glass-effect px-4 py-2 rounded-lg mb-6 flex items-center gap-2"

                                Voltar
                            </button>

                            <div className="glass-effect p-8 rounded-lg">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-2xl font-bold text-purple-300">Capítulos</h2>
                                    <button
                                        onClick={() => setView('read')}
                                        className="bg-gradient-to-r from-purple-500 to-pink-500 px-4 py-2 rounded-lg flex items-center gap-2"
                                    >
                                        <Icons.BookOpen />
                                        Modo Leitura
                                    </button>
                                </div>
                                <div className="space-y-3">
                                    {currentLN.chapters.map((chapter, idx) => (
                                        <div
                                            key={idx}
                                            className="bg-black/30 p-4 rounded-lg border border-gray-700 hover:border-purple-500/50 transition-all cursor-pointer"
                                            onClick={() => {
                                                setSelectedChapter(chapter);
                                                setView('read');
                                            }}
                                        >
                                            <div className="flex items-start justify-between">
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <h3 className="font-semibold text-lg">Capítulo {chapter.number}</h3>
                                                        {currentLN.lastReadChapter === chapter.number && (
                                                            <span className="text-xs bg-green-500/20 text-green-300 px-2 py-1 rounded-full border border-green-500/30">
                                                                📖 Última leitura
                                                            </span>
                                                        )}
                                                    </div>
                                                    
                                                    {/* Metadata Grid */}
                                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-2">
                                                        <div className="text-xs">
                                                            <span className="text-gray-500">IA:</span>
                                                            <span className="text-purple-300 ml-1 font-medium">
                                                                {chapter.metadata?.ai_provider || 'N/A'}
                                                            </span>
                                                        </div>
                                                        <div className="text-xs">
                                                            <span className="text-gray-500">Modelo:</span>
                                                            <span className="text-pink-300 ml-1 font-medium">
                                                                {chapter.metadata?.model || 'N/A'}
                                                            </span>
                                                        </div>
                                                        <div className="text-xs">
                                                            <span className="text-gray-500">Plano:</span>
                                                            <span className="text-blue-300 ml-1 font-medium">
                                                                {chapter.metadata?.plan || 'N/A'}
                                                            </span>
                                                        </div>
                                                        <div className="text-xs">
                                                            <span className="text-gray-500">Gerado:</span>
                                                            <span className="text-green-300 ml-1 font-medium">
                                                                {chapter.metadata?.generated_at 
                                                                    ? new Date(chapter.metadata.generated_at).toLocaleDateString('pt-BR')
                                                                    : 'N/A'}
                                                            </span>
                                                        </div>
                                                    </div>

                                                    <p className="text-sm text-gray-400">
                                                        Adicionado em {new Date(chapter.addedAt).toLocaleDateString('pt-BR')} às {new Date(chapter.addedAt).toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'})}
                                                    </p>
                                                </div>
                                                <Icons.BookOpen />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==================== READER ====================
        const Reader = ({ ln, onBack, initialChapter = null }) => {
            const [currentChapterIndex, setCurrentChapterIndex] = useState(() => {
                if (initialChapter) {
                    const index = ln.chapters.findIndex(ch => ch.number === initialChapter.number);
                    return index !== -1 ? index : 0;
                }
                // Use last read chapter if available
                if (ln.lastReadChapter) {
                    const index = ln.chapters.findIndex(ch => ch.number === ln.lastReadChapter);
                    if (index !== -1) return index;
                }
                return 0;
            });
            const [settings, setSettings] = useState({
                fontSize: 18,
                lineHeight: 1.8,
                fontFamily: 'serif',
                theme: 'dark'
            });
            const [showSettings, setShowSettings] = useState(false);

            const currentChapter = ln.chapters[currentChapterIndex];

            // Save last read chapter when it changes
            useEffect(() => {
                if (currentChapter) {
                    StorageManager.updateLN(ln.id, { lastReadChapter: currentChapter.number });
                }
            }, [currentChapter, ln.id]);

            const themes = {
                dark: { bg: 'bg-gray-900', text: 'text-gray-100' },
                sepia: { bg: 'bg-amber-50', text: 'text-amber-900' },
                black: { bg: 'bg-black', text: 'text-gray-300' }
            };

            const fonts = {
                serif: 'font-serif',
                sans: 'font-sans',
                mono: 'font-mono'
            };

            return (
                <div className={`min-h-screen ${themes[settings.theme].bg} transition-colors`}>
                    {/* Header */}
                    <div className="sticky top-0 glass-effect border-b border-gray-700 z-10">
                        <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                            <button
                                onClick={onBack}
                                className="px-4 py-2 rounded-lg hover:bg-white/10 transition-colors flex items-center gap-2"
                            >
                                <Icons.ArrowLeft />
                                Voltar
                            </button>
                            <div className="text-center">
                                <div className="text-sm text-gray-400">{ln.title}</div>
                                <div className="font-semibold">Capítulo {currentChapter.number}</div>
                            </div>
                            <button
                                onClick={() => setShowSettings(!showSettings)}
                                className="px-4 py-2 rounded-lg hover:bg-white/10 transition-colors"
                            >
                                <Icons.Settings />
                            </button>
                        </div>

                        {/* Settings Panel */}
                        {showSettings && (
                            <div className="border-t border-gray-700 p-6 fade-in">
                                <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className="block text-sm mb-2">Tamanho da Fonte: {settings.fontSize}px</label>
                                        <input
                                            type="range"
                                            min="14"
                                            max="28"
                                            value={settings.fontSize}
                                            onChange={(e) => setSettings({...settings, fontSize: parseInt(e.target.value)})}
                                            className="w-full"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-2">Espaçamento: {settings.lineHeight}</label>
                                        <input
                                            type="range"
                                            min="1.4"
                                            max="2.2"
                                            step="0.1"
                                            value={settings.lineHeight}
                                            onChange={(e) => setSettings({...settings, lineHeight: parseFloat(e.target.value)})}
                                            className="w-full"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-2">Fonte</label>
                                        <select
                                            value={settings.fontFamily}
                                            onChange={(e) => setSettings({...settings, fontFamily: e.target.value})}
                                            className="w-full bg-black/50 border border-gray-700 rounded-lg p-2"
                                        >
                                            <option value="serif">Serif</option>
                                            <option value="sans">Sans-serif</option>
                                            <option value="mono">Monospace</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-2">Tema</label>
                                        <select
                                            value={settings.theme}
                                            onChange={(e) => setSettings({...settings, theme: e.target.value})}
                                            className="w-full bg-black/50 border border-gray-700 rounded-lg p-2"
                                        >
                                            <option value="dark">Escuro</option>
                                            <option value="sepia">Sépia</option>
                                            <option value="black">Preto Puro</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Content */}
                    <div className="max-w-4xl mx-auto px-6 py-12">
                        <div
                            className={`${themes[settings.theme].text} ${fonts[settings.fontFamily]} whitespace-pre-wrap`}
                            style={{
                                fontSize: `${settings.fontSize}px`,
                                lineHeight: settings.lineHeight
                            }}
                        >
                            {currentChapter.content}
                        </div>
                    </div>

                    {/* Navigation */}
                    <div className="sticky bottom-0 glass-effect border-t border-gray-700">
                        <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                            <button
                                onClick={() => setCurrentChapterIndex(Math.max(0, currentChapterIndex - 1))}
                                disabled={currentChapterIndex === 0}
                                className="px-6 py-2 rounded-lg hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                            >
                                ← Anterior
                            </button>
                            <div className="text-sm text-gray-400">
                                {currentChapterIndex + 1} de {ln.chapters.length}
                            </div>
                            <button
                                onClick={() => setCurrentChapterIndex(Math.min(ln.chapters.length - 1, currentChapterIndex + 1))}
                                disabled={currentChapterIndex === ln.chapters.length - 1}
                                className="px-6 py-2 rounded-lg hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                            >
                                Próximo →
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== MAIN APP ====================
        const App = () => {
            const [currentView, setCurrentView] = useState('dashboard');
            const [selectedLN, setSelectedLN] = useState(null);

            const handleCreateNew = () => {
                setCurrentView('create');
            };

            const handleCreationComplete = (ln) => {
                setSelectedLN(ln);
                setCurrentView('manager');
            };

            const handleSelectLN = (ln) => {
                setSelectedLN(ln);
                setCurrentView('manager');
            };

            const handleBackToDashboard = () => {
                setSelectedLN(null);
                setCurrentView('dashboard');
            };

            return (
                <>
                    {currentView === 'dashboard' && (
                        <Dashboard onCreateNew={handleCreateNew} onSelectLN={handleSelectLN} />
                    )}
                    {currentView === 'create' && (
                        <CreationForm onBack={handleBackToDashboard} onComplete={handleCreationComplete} />
                    )}
                    {currentView === 'manager' && selectedLN && (
                        <LNManager ln={selectedLN} onBack={handleBackToDashboard} />
                    )}
                </>
            );
        };

        // Render
        ReactDOM.render(<App />, document.getElementById('root'));

        // ==================== PWA INITIALIZATION ====================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/LNStudio/sw.js', { scope: '/LNStudio/' })
                    .then(registration => {
                        console.log('SW registered:', registration.scope);
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    if (confirm('Nova versão disponível! Recarregar para atualizar?')) {
                                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch(err => console.log('SW registration failed:', err));
            });
        }

        // Initialize PWA installer
        PWAInstaller.init();
    </script>
</body>
</html>
