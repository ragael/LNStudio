        const { useState, useEffect } = React;

        // ==================== STORAGE MANAGER ====================
        const StorageManager = {
            getLNs: () => {
                const data = localStorage.getItem('lightNovels');
                return data ? JSON.parse(data) : [];
            },
            saveLNs: (lns) => {
                localStorage.setItem('lightNovels', JSON.stringify(lns));
            },
            createLN: (ln) => {
                const lns = StorageManager.getLNs();
                const newLN = {
                    ...ln,
                    id: Date.now().toString(),
                    createdAt: new Date().toISOString(),
                    chapters: [],
                    continuityDB: null
                };
                lns.push(newLN);
                StorageManager.saveLNs(lns);
                return newLN;
            },
            updateLN: (id, updates) => {
                const lns = StorageManager.getLNs();
                const index = lns.findIndex(ln => ln.id === id);
                if (index !== -1) {
                    lns[index] = { ...lns[index], ...updates };
                    StorageManager.saveLNs(lns);
                    return lns[index];
                }
                return null;
            },
            deleteLN: (id) => {
                const lns = StorageManager.getLNs().filter(ln => ln.id !== id);
                StorageManager.saveLNs(lns);
            },
            addChapter: (lnId, chapterData) => {
                const lns = StorageManager.getLNs();
                const ln = lns.find(l => l.id === lnId);
                if (ln) {
                    const chapter = {
                        number: ln.chapters.length + 1,
                        content: chapterData.content,
                        metadata: chapterData.metadata || {
                            ai_provider: 'Unknown',
                            model: 'Unknown',
                            plan: 'Unknown',
                            generated_at: new Date().toISOString()
                        },
                        addedAt: new Date().toISOString()
                    };
                    ln.chapters.push(chapter);
                    ln.continuityDB = chapterData.continuity;
                    StorageManager.saveLNs(lns);
                    return ln;
                }
                return null;
            },
            exportLN: (id) => {
                const lns = StorageManager.getLNs();
                const ln = lns.find(l => l.id === id);
                if (ln) {
                    const dataStr = JSON.stringify(ln, null, 2);
                    const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                    const exportFileDefaultName = `${ln.title.replace(/\s+/g, '_')}_backup.json`;
                    const linkElement = document.createElement('a');
                    linkElement.setAttribute('href', dataUri);
                    linkElement.setAttribute('download', exportFileDefaultName);
                    linkElement.click();
                }
            },
            importLN: (jsonData) => {
                try {
                    const ln = JSON.parse(jsonData);
                    const lns = StorageManager.getLNs();
                    ln.id = Date.now().toString();
                    ln.createdAt = new Date().toISOString();
                    lns.push(ln);
                    StorageManager.saveLNs(lns);
                    return ln;
                } catch (e) {
                    console.error('Import error:', e);
                    return null;
                }
            }
        };

        const JSONValidator = {
            validate: (jsonString) => {
                try {
                    const data = JSON.parse(jsonString);
                    
                    // Validar estrutura básica
                    if (!data.metadata || !data.chapter || !data.continuity) {
                        return { 
                            valid: false, 
                            error: 'Estrutura JSON incompleta. Faltam campos obrigatórios: metadata, chapter ou continuity.' 
                        };
                    }
                    
                    // Validar metadata
                    if (!data.metadata.ai_provider || !data.metadata.model || !data.metadata.plan) {
                        return { 
                            valid: false, 
                            error: 'Metadata incompleto. É obrigatório informar: ai_provider, model e plan.' 
                        };
                    }
                    
                    // Validar chapter
                    if (!data.chapter.content || typeof data.chapter.content !== 'string') {
                        return { 
                            valid: false, 
                            error: 'Campo chapter.content é obrigatório e deve ser uma string.' 
                        };
                    }
                    
                    // Validar continuity básico
                    if (!data.continuity.summary || !data.continuity.protagonist) {
                        return { 
                            valid: false, 
                            error: 'Continuity incompleto. É obrigatório ter summary e protagonist.' 
                        };
                    }
                    
                    return { valid: true, data };
                } catch (e) {
                    return { 
                        valid: false, 
                        error: `JSON inválido: ${e.message}`,
                        parseError: true
                    };
                }
            },
            
            extractJSON: (text) => {
                // Tentar extrair JSON de markdown code blocks
                const codeBlockMatch = text.match(/```(?:json)?\s*(\{[\s\S]*?\})\s*```/);
                if (codeBlockMatch) {
                    return codeBlockMatch[1];
                }
                
                // Tentar encontrar JSON puro
                const jsonMatch = text.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    return jsonMatch[0];
                }
                
                return text;
            },
            
            generateCorrectionPrompt: (originalText, error) => {

                                                <strong>Erro:</strong> {validationResult.error}
                                            </p>
                                            <p className="text-sm text-gray-300">
                                                {validationResult.parseError 
                                                    ? 'O texto não é um JSON válido. Verifique sintaxe (vírgulas, aspas, chaves).'
                                                    : 'O JSON está sintaticamente correto, mas faltam campos obrigatórios.'}
                                            </p>
                                        </div>

                                        {/* Correction Prompt */}
                                        <div className="glass-effect p-6 rounded-lg">
                                            <div className="flex items-center justify-between mb-4">
                                                <h3 className="text-lg font-semibold text-purple-300">Prompt de Correção</h3>
                                                <button
                                                    onClick={() => {
                                                        navigator.clipboard.writeText(correctionPrompt);
                                                        alert('Prompt copiado!');
                                                    }}
                                                    className="bg-purple-600 px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-purple-700 text-sm"
                                                >
                                                    <Icons.Copy />
                                                    Copiar Prompt
                                                </button>
                                            </div>
                                            <p className="text-sm text-gray-400 mb-3">
                                                Cole este prompt na IA para ela reformatar a resposta no formato correto:
                                            </p>
                                            <div className="bg-black/50 border border-gray-700 rounded-lg p-4 max-h-96 overflow-y-auto">
                                                <pre className="text-xs text-gray-300 whitespace-pre-wrap font-mono">
                                                    {correctionPrompt}
                                                </pre>
                                            </div>
                                        </div>

                                        {/* Action Buttons */}
                                        <div className="flex gap-3">
                                            <button
                                                onClick={() => {
                                                    setValidationResult(null);
                                                }}
                                                className="bg-blue-600 px-6 py-3 rounded-lg hover:bg-blue-700"
                                            >
                                                Tentar Novamente
                                            </button>
                                            <button
                                                onClick={() => setView('main')}
                                                className="glass-effect px-6 py-3 rounded-lg"
                                            >
                                                Cancelar
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'editDB') {
                return (
                    <div className="min-h-screen p-8">
                        <div className="max-w-4xl mx-auto">
                            <button
                                onClick={() => setView('main')}
                                className="glass-effect px-4 py-2 rounded-lg mb-6 flex items-center gap-2"
                            >
                                <Icons.ArrowLeft />
                                Voltar
                            </button>
                            <div className="glass-effect p-8 rounded-lg">
                                <h2 className="text-2xl font-bold text-purple-300 mb-4">
                                    Editar Banco de Dados de Continuidade
                                </h2>
                                <textarea
                                    value={editDBText}
                                    onChange={(e) => setEditDBText(e.target.value)}
                                    className="w-full h-96 bg-black/50 border border-gray-700 rounded-lg p-4 text-gray-300 mb-4 font-mono text-sm"
                                />
                                <div className="flex gap-3">
                                    <button
                                        onClick={handleSaveDB}
                                        className="bg-green-600 px-6 py-3 rounded-lg hover:bg-green-700"
                                    >
                                        Salvar
                                    </button>
                                    <button
                                        onClick={() => setView('main')}
                                        className="glass-effect px-6 py-3 rounded-lg"
                                    >
                                        Cancelar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'read') {
                return <Reader ln={currentLN} onBack={() => setView('main')} />;
            }

            return (
                <div className="min-h-screen p-8">
                    <div className="max-w-6xl mx-auto">
                        <button
                            onClick={onBack}
                            className="glass-effect px-4 py-2 rounded-lg mb-6 flex items-center gap-2"
                        >
                            <Icons.ArrowLeft />
                            Dashboard
                        </button>

                        <div className="glass-effect p-8 rounded-lg mb-6">
                            <div className="flex items-start justify-between mb-6">
                                <div>
                                    <h1 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">
                                        {currentLN.title}
                                    </h1>
                                    <p className="text-gray-400 mt-2">
                                        {currentLN.genres.join(' • ')}
                                    </p>
                                </div>
                                <div className="flex gap-2">
                                    <button
                                        onClick={() => {
                                            setEditDBText(currentLN.continuityDB || '');
                                            setView('editDB');
                                        }}
                                        disabled={!currentLN.continuityDB}
                                        className="glass-effect px-4 py-2 rounded-lg flex items-center gap-2 disabled:opacity-50"
                                    >
                                        <Icons.Edit />
                                        Editar BD
                                    </button>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-purple-500/20 p-4 rounded-lg border border-purple-500/30">
                                    <div className="text-3xl font-bold text-purple-300">
                                        {currentLN.chapters.length}
                                    </div>
                                    <div className="text-sm text-gray-400 mt-1">Capítulos</div>
                                </div>
                                <div className="bg-pink-500/20 p-4 rounded-lg border border-pink-500/30">
                                    <div className="text-3xl font-bold text-pink-300">
                                        {currentLN.elements.length}
                                    </div>
                                    <div className="text-sm text-gray-400 mt-1">Elementos</div>
                                </div>
                                <div className="bg-blue-500/20 p-4 rounded-lg border border-blue-500/30">
                                    <div className="text-3xl font-bold text-blue-300">
                                        {currentLN.actionLevel}/{currentLN.sliceOfLifeLevel}
                                    </div>
                                    <div className="text-sm text-gray-400 mt-1">Ação/SoL</div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <button
                                onClick={() => setView('prompt')}
                                className="glass-effect p-6 rounded-lg hover-glow transition-all text-left"
                            >
                                <div className="flex items-center gap-3 mb-2">
                                    <Icons.Copy />
                                    <h3 className="text-xl font-semibold">Gerar Prompt</h3>
                                </div>
                                <p className="text-gray-400 text-sm">
                                    Copie o prompt para o próximo capítulo ({currentLN.chapters.length + 1})
                                </p>
                            </button>

                            <button
                                onClick={() => setView('addChapter')}
                                className="glass-effect p-6 rounded-lg hover-glow transition-all text-left"
                            >
                                <div className="flex items-center gap-3 mb-2">
                                    <Icons.Plus />
                                    <h3 className="text-xl font-semibold">Adicionar Capítulo</h3>
                                </div>
                                <p className="text-gray-400 text-sm">
                                    Cole a resposta da IA para processar
                                </p>
                            </button>
                        </div>

                        {currentLN.chapters.length > 0 && (
                            <div className="glass-effect p-8 rounded-lg">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-2xl font-bold text-purple-300">Capítulos</h2>
                                    <button
                                        onClick={() => setView('read')}
                                        className="bg-gradient-to-r from-purple-500 to-pink-500 px-4 py-2 rounded-lg flex items-center gap-2"
                                    >
                                        <Icons.BookOpen />
                                        Modo Leitura
                                    </button>
                                </div>
                                <div className="space-y-3">
                                    {currentLN.chapters.map((chapter, idx) => (
                                        <div
                                            key={idx}
                                            className="bg-black/30 p-4 rounded-lg border border-gray-700 hover:border-purple-500/50 transition-all cursor-pointer"
                                            onClick={() => {
                                                setSelectedChapter(chapter);
                                                setView('read');
                                            }}
                                        >
                                            <div className="flex items-start justify-between">
                                                <div className="flex-1">
                                                    <h3 className="font-semibold text-lg mb-2">Capítulo {chapter.number}</h3>
                                                    
                                                    {/* Metadata Grid */}
                                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-2">
                                                        <div className="text-xs">
                                                            <span className="text-gray-500">IA:</span>
                                                            <span className="text-purple-300 ml-1 font-medium">
                                                                {chapter.metadata?.ai_provider || 'N/A'}
                                                            </span>
                                                        </div>
                                                        <div className="text-xs">
                                                            <span className="text-gray-500">Modelo:</span>
                                                            <span className="text-pink-300 ml-1 font-medium">
                                                                {chapter.metadata?.model || 'N/A'}
                                                            </span>
                                                        </div>
                                                        <div className="text-xs">
                                                            <span className="text-gray-500">Plano:</span>
                                                            <span className="text-blue-300 ml-1 font-medium">
                                                                {chapter.metadata?.plan || 'N/A'}
                                                            </span>
                                                        </div>
                                                        <div className="text-xs">
                                                            <span className="text-gray-500">Gerado:</span>
                                                            <span className="text-green-300 ml-1 font-medium">
                                                                {chapter.metadata?.generated_at 
                                                                    ? new Date(chapter.metadata.generated_at).toLocaleDateString('pt-BR')
                                                                    : 'N/A'}
                                                            </span>
                                                        </div>
                                                    </div>

                                                    <p className="text-sm text-gray-400">
                                                        Adicionado em {new Date(chapter.addedAt).toLocaleDateString('pt-BR')} às {new Date(chapter.addedAt).toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'})}
                                                    </p>
                                                </div>
                                                <Icons.BookOpen />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==================== READER ====================
        const Reader = ({ ln, onBack }) => {
            const [currentChapterIndex, setCurrentChapterIndex] = useState(0);
            const [settings, setSettings] = useState({
                fontSize: 18,
                lineHeight: 1.8,
                fontFamily: 'serif',
                theme: 'dark'
            });
            const [showSettings, setShowSettings] = useState(false);

            const currentChapter = ln.chapters[currentChapterIndex];

            const themes = {
                dark: { bg: 'bg-gray-900', text: 'text-gray-100' },
                sepia: { bg: 'bg-amber-50', text: 'text-amber-900' },
                black: { bg: 'bg-black', text: 'text-gray-300' }
            };

            const fonts = {
                serif: 'font-serif',
                sans: 'font-sans',
                mono: 'font-mono'
            };

            return (
                <div className={`min-h-screen ${themes[settings.theme].bg} transition-colors`}>
                    {/* Header */}
                    <div className="sticky top-0 glass-effect border-b border-gray-700 z-10">
                        <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                            <button
                                onClick={onBack}
                                className="px-4 py-2 rounded-lg hover:bg-white/10 transition-colors flex items-center gap-2"
                            >
                                <Icons.ArrowLeft />
                                Voltar
                            </button>
                            <div className="text-center">
                                <div className="text-sm text-gray-400">{ln.title}</div>
                                <div className="font-semibold">Capítulo {currentChapter.number}</div>
                            </div>
                            <button
                                onClick={() => setShowSettings(!showSettings)}
                                className="px-4 py-2 rounded-lg hover:bg-white/10 transition-colors"
                            >
                                <Icons.Settings />
                            </button>
                        </div>

                        {/* Settings Panel */}
                        {showSettings && (
                            <div className="border-t border-gray-700 p-6 fade-in">
                                <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className="block text-sm mb-2">Tamanho da Fonte: {settings.fontSize}px</label>
                                        <input
                                            type="range"
                                            min="14"
                                            max="28"
                                            value={settings.fontSize}
                                            onChange={(e) => setSettings({...settings, fontSize: parseInt(e.target.value)})}
                                            className="w-full"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-2">Espaçamento: {settings.lineHeight}</label>
                                        <input
                                            type="range"
                                            min="1.4"
                                            max="2.2"
                                            step="0.1"
                                            value={settings.lineHeight}
                                            onChange={(e) => setSettings({...settings, lineHeight: parseFloat(e.target.value)})}
                                            className="w-full"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-2">Fonte</label>
                                        <select
                                            value={settings.fontFamily}
                                            onChange={(e) => setSettings({...settings, fontFamily: e.target.value})}
                                            className="w-full bg-black/50 border border-gray-700 rounded-lg p-2"
                                        >
                                            <option value="serif">Serif</option>
                                            <option value="sans">Sans-serif</option>
                                            <option value="mono">Monospace</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-2">Tema</label>
                                        <select
                                            value={settings.theme}
                                            onChange={(e) => setSettings({...settings, theme: e.target.value})}
                                            className="w-full bg-black/50 border border-gray-700 rounded-lg p-2"
                                        >
                                            <option value="dark">Escuro</option>
                                            <option value="sepia">Sépia</option>
                                            <option value="black">Preto Puro</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Content */}
                    <div className="max-w-4xl mx-auto px-6 py-12">
                        <div
                            className={`${themes[settings.theme].text} ${fonts[settings.fontFamily]} whitespace-pre-wrap`}
                            style={{
                                fontSize: `${settings.fontSize}px`,
                                lineHeight: settings.lineHeight
                            }}
                        >
                            {currentChapter.content}
                        </div>
                    </div>

                    {/* Navigation */}
                    <div className="sticky bottom-0 glass-effect border-t border-gray-700">
                        <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                            <button
                                onClick={() => setCurrentChapterIndex(Math.max(0, currentChapterIndex - 1))}
                                disabled={currentChapterIndex === 0}
                                className="px-6 py-2 rounded-lg hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                            >
                                ← Anterior
                            </button>
                            <div className="text-sm text-gray-400">
                                {currentChapterIndex + 1} de {ln.chapters.length}
                            </div>
                            <button
                                onClick={() => setCurrentChapterIndex(Math.min(ln.chapters.length - 1, currentChapterIndex + 1))}
                                disabled={currentChapterIndex === ln.chapters.length - 1}
                                className="px-6 py-2 rounded-lg hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                            >
                                Próximo →
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== MAIN APP ====================
        const App = () => {
            const [currentView, setCurrentView] = useState('dashboard');
            const [selectedLN, setSelectedLN] = useState(null);

            const handleCreateNew = () => {
                setCurrentView('create');
            };

            const handleCreationComplete = (ln) => {
                setSelectedLN(ln);
                setCurrentView('manager');
            };

            const handleSelectLN = (ln) => {
                setSelectedLN(ln);
                setCurrentView('manager');
            };

            const handleBackToDashboard = () => {
                setSelectedLN(null);
                setCurrentView('dashboard');
            };

            return (
                <>
                    {currentView === 'dashboard' && (
                        <Dashboard onCreateNew={handleCreateNew} onSelectLN={handleSelectLN} />
                    )}
                    {currentView === 'create' && (
                        <CreationForm onBack={handleBackToDashboard} onComplete={handleCreationComplete} />
                    )}
                    {currentView === 'manager' && selectedLN && (
                        <LNManager ln={selectedLN} onBack={handleBackToDashboard} />
                    )}
                </>
            );
        };

        // Render
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
