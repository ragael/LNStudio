<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==================== INDEXEDDB MANAGER ====================
        const DB_NAME = 'LightNovelManagerDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'lightNovels';

        const IndexedDBManager = {
            db: null,
            
            init: async () => {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        IndexedDBManager.db = request.result;
                        resolve(request.result);
                    };
                    
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            const objectStore = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                            objectStore.createIndex('title', 'title', { unique: false });
                            objectStore.createIndex('createdAt', 'createdAt', { unique: false });
                        }
                    };
                });
            },
            
            getLNs: async () => {
                return new Promise((resolve, reject) => {
                    const transaction = IndexedDBManager.db.transaction([STORE_NAME], 'readonly');
                    const objectStore = transaction.objectStore(STORE_NAME);
                    const request = objectStore.getAll();
                    
                    request.onsuccess = () => resolve(request.result || []);
                    request.onerror = () => reject(request.error);
                });
            },
            
            saveLN: async (ln) => {
                return new Promise((resolve, reject) => {
                    const transaction = IndexedDBManager.db.transaction([STORE_NAME], 'readwrite');
                    const objectStore = transaction.objectStore(STORE_NAME);
                    const request = objectStore.put(ln);
                    
                    request.onsuccess = () => resolve(ln);
                    request.onerror = () => reject(request.error);
                });
            },
            
            deleteLN: async (id) => {
                return new Promise((resolve, reject) => {
                    const transaction = IndexedDBManager.db.transaction([STORE_NAME], 'readwrite');
                    const objectStore = transaction.objectStore(STORE_NAME);
                    const request = objectStore.delete(id);
                    
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },
            
            // Migration from localStorage
            migrateFromLocalStorage: async () => {
                try {
                    const oldData = localStorage.getItem('lightNovels');
                    if (oldData) {
                        const lns = JSON.parse(oldData);
                        for (const ln of lns) {
                            await IndexedDBManager.saveLN(ln);
                        }
                        console.log('Migration completed:', lns.length, 'light novels migrated');
                        // Keep localStorage as backup for now
                        // localStorage.removeItem('lightNovels');
                    }
                } catch (error) {
                    console.error('Migration error:', error);
                }
            }
        };

        // ==================== STORAGE MANAGER (IndexedDB wrapper) ====================
        const StorageManager = {
            initialized: false,
            
            ensureInit: async () => {
                if (!StorageManager.initialized) {
                    await IndexedDBManager.init();
                    await IndexedDBManager.migrateFromLocalStorage();
                    StorageManager.initialized = true;
                }
            },
            
            getLNs: async () => {
                await StorageManager.ensureInit();
                return await IndexedDBManager.getLNs();
            },
            
            createLN: async (ln) => {
                await StorageManager.ensureInit();
                const newLN = {
                    ...ln,
                    id: Date.now().toString(),
                    createdAt: new Date().toISOString(),
                    chapters: [],
                    continuityDB: null,
                    lastReadChapter: null
                };
                const saved = await IndexedDBManager.saveLN(newLN);
                
                // Auto-sync to Supabase if configured and logged in
                if (SupabaseManager.isConfigured()) {
                    try {
                        const user = await SupabaseManager.getCurrentUser();
                        if (user) {
                            await SupabaseManager.saveLN(saved);
                        }
                    } catch (error) {
                        console.warn('Failed to sync to Supabase:', error);
                        // Continue anyway - local save succeeded
                    }
                }
                
                return saved;
            },
            
            updateLN: async (id, updates) => {
                await StorageManager.ensureInit();
                const lns = await IndexedDBManager.getLNs();
                const ln = lns.find(l => l.id === id);
                if (ln) {
                    const updated = { ...ln, ...updates };
                    const saved = await IndexedDBManager.saveLN(updated);
                    
                    // Auto-sync to Supabase if configured and logged in
                    if (SupabaseManager.isConfigured()) {
                        try {
                            const user = await SupabaseManager.getCurrentUser();
                            if (user) {
                                await SupabaseManager.saveLN(saved);
                            }
                        } catch (error) {
                            console.warn('Failed to sync to Supabase:', error);
                            // Continue anyway - local save succeeded
                        }
                    }
                    
                    return saved;
                }
                return null;
            },
            
            deleteLN: async (id) => {
                await StorageManager.ensureInit();
                
                // Delete from IndexedDB
                await IndexedDBManager.deleteLN(id);
                
                // Also delete from Supabase if configured and logged in
                if (SupabaseManager.isConfigured()) {
                    try {
                        const user = await SupabaseManager.getCurrentUser();
                        if (user) {
                            await SupabaseManager.deleteLN(id);
                        }
                    } catch (error) {
                        console.warn('Failed to delete from Supabase:', error);
                        // Continue anyway - local deletion succeeded
                    }
                }
            },
            
            addChapter: async (lnId, chapterData) => {
                await StorageManager.ensureInit();
                const lns = await IndexedDBManager.getLNs();
                const ln = lns.find(l => l.id === lnId);
                if (ln) {
                    const chapter = {
                        number: ln.chapters.length + 1,
                        content: chapterData.content,
                        metadata: chapterData.metadata || {
                            ai_provider: 'Unknown',
                            model: 'Unknown',
                            plan: 'Unknown',
                            generated_at: new Date().toISOString()
                        },
                        addedAt: new Date().toISOString()
                    };
                    ln.chapters.push(chapter);
                    ln.continuityDB = chapterData.continuity;
                    const saved = await IndexedDBManager.saveLN(ln);
                    
                    // Auto-sync to Supabase if configured and logged in
                    if (SupabaseManager.isConfigured()) {
                        try {
                            const user = await SupabaseManager.getCurrentUser();
                            if (user) {
                                await SupabaseManager.saveLN(saved);
                            }
                        } catch (error) {
                            console.warn('Failed to sync to Supabase:', error);
                            // Continue anyway - local save succeeded
                        }
                    }
                    
                    return saved;
                }
                return null;
            },
            
            exportLN: async (id) => {
                await StorageManager.ensureInit();
                const lns = await IndexedDBManager.getLNs();
                const ln = lns.find(l => l.id === id);
                if (ln) {
                    const dataStr = JSON.stringify(ln, null, 2);
                    const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                    const exportFileDefaultName = `${ln.title.replace(/\s+/g, '_')}_backup.json`;
                    const linkElement = document.createElement('a');
                    linkElement.setAttribute('href', dataUri);
                    linkElement.setAttribute('download', exportFileDefaultName);
                    linkElement.click();
                }
            },
            
            importLN: async (jsonData) => {
                await StorageManager.ensureInit();
                try {
                    const ln = JSON.parse(jsonData);
                    ln.id = Date.now().toString();
                    ln.createdAt = new Date().toISOString();
                    return await IndexedDBManager.saveLN(ln);
                } catch (e) {
                    console.error('Import error:', e);
                    return null;
                }
            }
        };

        // ==================== CONFIG MANAGER ====================
        const ConfigManager = {
            // Supabase Config
            getSupabaseConfig: () => {
                const stored = localStorage.getItem('supabase_config');
                return stored ? JSON.parse(stored) : { url: '', key: '', enabled: false };
            },
            
            setSupabaseConfig: (url, key, enabled = true) => {
                localStorage.setItem('supabase_config', JSON.stringify({ url, key, enabled }));
            },
            
            // Reader Global Settings
            getReaderSettings: () => {
                const stored = localStorage.getItem('reader_settings');
                return stored ? JSON.parse(stored) : {
                    fontSize: 18,
                    lineHeight: 1.8,
                    fontFamily: 'serif',
                    theme: 'dark'
                };
            },
            
            setReaderSettings: (settings) => {
                localStorage.setItem('reader_settings', JSON.stringify(settings));
            },
            
            // Scroll Positions per Chapter
            getScrollPosition: (lnId, chapterNumber) => {
                const key = `scroll_${lnId}_${chapterNumber}`;
                return parseFloat(localStorage.getItem(key) || '0');
            },
            
            setScrollPosition: (lnId, chapterNumber, percentage) => {
                const key = `scroll_${lnId}_${chapterNumber}`;
                localStorage.setItem(key, percentage.toString());
            }
        };

        // ==================== SUPABASE MANAGER ====================
        let supabaseClient = null;
        
        const SupabaseManager = {
            init: () => {
                const config = ConfigManager.getSupabaseConfig();
                if (config.enabled && config.url && config.key) {
                    try {
                        supabaseClient = window.supabase.createClient(config.url, config.key);
                        return true;
                    } catch (error) {
                        console.error('Supabase init failed:', error);
                        return false;
                    }
                }
                return false;
            },
            
            isConfigured: () => {
                const config = ConfigManager.getSupabaseConfig();
                return config.enabled && config.url && config.key;
            },
            
            // Auth
            signUp: async (email, password) => {
                if (!supabaseClient) throw new Error('Supabase not configured');
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) throw error;
                return data;
            },
            
            signIn: async (email, password) => {
                if (!supabaseClient) throw new Error('Supabase not configured');
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                return data;
            },
            
            signOut: async () => {
                if (!supabaseClient) throw new Error('Supabase not configured');
                const { error } = await supabaseClient.auth.signOut();
                if (error) throw error;
            },
            
            getCurrentUser: async () => {
                if (!supabaseClient) return null;
                const { data: { user } } = await supabaseClient.auth.getUser();
                return user;
            },
            
            // Data Sync
            saveLN: async (ln) => {
                if (!supabaseClient) throw new Error('Supabase not configured');
                const user = await SupabaseManager.getCurrentUser();
                if (!user) throw new Error('User not authenticated');
                
                const { error } = await supabaseClient
                    .from('light_novels')
                    .upsert({
                        id: ln.id,
                        user_id: user.id,
                        data: ln,
                        updated_at: new Date().toISOString()
                    });
                    
                if (error) throw error;
            },
            
            getLNs: async () => {
                if (!supabaseClient) throw new Error('Supabase not configured');
                const user = await SupabaseManager.getCurrentUser();
                if (!user) return [];
                
                const { data, error } = await supabaseClient
                    .from('light_novels')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false });
                    
                if (error) throw error;
                return data.map(row => row.data);
            },
            
            deleteLN: async (id) => {
                if (!supabaseClient) throw new Error('Supabase not configured');
                const { error } = await supabaseClient
                    .from('light_novels')
                    .delete()
                    .eq('id', id);
                    
                if (error) throw error;
            },
            
            sync: async () => {
                if (!supabaseClient) throw new Error('Supabase not configured');
                
                // Get data from both sources
                const cloudLNs = await SupabaseManager.getLNs();
                const localLNs = await IndexedDBManager.getLNs();
                
                // Merge (most recent wins)
                const merged = {};
                
                localLNs.forEach(ln => {
                    merged[ln.id] = ln;
                });
                
                cloudLNs.forEach(ln => {
                    const localUpdated = merged[ln.id]?.updatedAt || merged[ln.id]?.createdAt;
                    const cloudUpdated = ln.updatedAt || ln.createdAt;
                    
                    if (!merged[ln.id] || new Date(cloudUpdated) > new Date(localUpdated)) {
                        merged[ln.id] = ln;
                    }
                });
                
                // Save to both
                const mergedArray = Object.values(merged);
                for (const ln of mergedArray) {
                    await IndexedDBManager.saveLN(ln);
                    await SupabaseManager.saveLN(ln);
                }
                
                return mergedArray;
            }
        };

        // ==================== PROMPT GENERATOR ====================
        const PromptGenerator = {
            generateInitialPrompt: (config) => {
                const notesSection = config.notesList && config.notesList.length > 0
                    ? `NOTAS ADICIONAIS:\n${config.notesList.map(note => `- ${note}`).join('\n')}`
                    : '';
                
                const titleInstruction = !config.title || config.title.trim() === ''
                    ? 'IMPORTANTE: Como nenhum título foi fornecido, você DEVE criar um título criativo e apropriado para esta light novel baseado nos gêneros e elementos escolhidos.'
                    : `Título da obra: "${config.title}"`;
                
                return `Você é um autor de light novels e vai criar uma história serializada original para mim. Você tem total liberdade criativa.

${titleInstruction}

DIRETRIZES DE ESTILO:
- Gêneros: ${config.genres.join(', ')}
- Narrativa: Primeira pessoa
- Capítulos: Longos (3000-5000 palavras)

ELEMENTOS QUE DEVO INCLUIR:
${config.elements.map(e => `- ${e}`).join('\n')}

${notesSection}

SUA MISSÃO:
1. Crie TUDO: mundo, personagens, premissa, sistema de poder, plot
2. ${!config.title ? 'Crie um título criativo para a obra' : 'Use o título fornecido'}
3. Escreva o Capítulo 1 completo (3000-5000 palavras)
4. Mantenha consistência absoluta entre capítulos

        // ==================== JSON SCHEMA & VALIDATOR ====================
        const ChapterSchema = {
            description: "Formato JSON obrigatório para respostas",
            structure: {
                metadata: {
                    ai_provider: "string - Ex: Claude, GPT, Gemini, etc",
                    model: "string - Ex: claude-sonnet-4, gpt-4, etc",
                    plan: "string - Ex: Pro, Free, API, etc",
                    generated_at: "string - Data/hora ISO 8601"
                },
                chapter: {
                    number: "number",
                    content: "string - Conteúdo narrativo completo do capítulo"
                },
                continuity: {
                    summary: "string - Resumo de 2-3 frases do capítulo",
                    protagonist: {
                        name: "string",
                        age: "string/number",
                        level_power: "string - Estado atual do poder/nível",
                        abilities: "array - Lista de habilidades",
                        current_goal: "string"
                    },
                    secondary_characters: "array - [{name, relationship, traits}]",
                    worldbuilding: {
                        current_location: "string",
                        world_rules: "string - Magia, tech, sociedade",
                        organizations: "array - Guildas, empresas, etc"
                    },
                    power_system: {
                        mechanics: "string - Como funciona",
                        progression: "string - Como evolui"
                    },
                    plot_threads: {
                        main: "string",
                        secondary: "array"
                    },
                    next_chapter_suggestions: "array - Ideias para próximo cap"
                }
            }
        };

        const JSONValidator = {
            validate: (jsonString) => {
                try {
                    const data = JSON.parse(jsonString);
                    
                    // Validar estrutura básica
                    if (!data.metadata || !data.chapter || !data.continuity) {
                        return { 
                            valid: false, 
                            error: 'Estrutura JSON incompleta. Faltam campos obrigatórios: metadata, chapter ou continuity.' 
                        };
                    }
                    
                    // Validar metadata
                    if (!data.metadata.ai_provider || !data.metadata.model || !data.metadata.plan) {
                        return { 
                            valid: false, 
                            error: 'Metadata incompleto. É obrigatório informar: ai_provider, model e plan.' 
                        };
                    }
                    
                    // Validar chapter
                    if (!data.chapter.content || typeof data.chapter.content !== 'string') {
                        return { 
                            valid: false, 
                            error: 'Campo chapter.content é obrigatório e deve ser uma string.' 
                        };
                    }
                    
                    // Validar continuity básico
                    if (!data.continuity.summary || !data.continuity.protagonist) {
                        return { 
                            valid: false, 
                            error: 'Continuity incompleto. É obrigatório ter summary e protagonist.' 
                        };
                    }
                    
                    return { valid: true, data };
                } catch (e) {
                    return { 
                        valid: false, 
                        error: `JSON inválido: ${e.message}`,
                        parseError: true
                    };

                        currentLN.chapters.length + 1

                                                {validationResult.parseError 
                                                    ? 'O texto não é um JSON válido. Verifique sintaxe (vírgulas, aspas, chaves).'
                                                    : 'O JSON está sintaticamente correto, mas faltam campos obrigatórios.'}
                                            </p>
                                        </div>

                                        {/* Correction Prompt */}
                                        <div className="glass-effect p-6 rounded-lg">
                                            <div className="flex items-center justify-between mb-4">
                                                <h3 className="text-lg font-semibold text-purple-300">Prompt de Correção</h3>
                                                <button
                                                    onClick={() => {
                                                        navigator.clipboard.writeText(validationResult.correctionPrompt || '');
                                                        alert('Prompt copiado!');
                                                    }}
                                                    className="bg-purple-600 px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-purple-700 text-sm"
                                                >
                                                    <Icons.Copy />
                                                    Copiar Prompt
                                                </button>
                                            </div>
                                            <p className="text-sm text-gray-400 mb-3">
                                                Cole este prompt na IA para ela reformatar a resposta no formato correto:
                                            </p>
                                            <div className="bg-black/50 border border-gray-700 rounded-lg p-4 max-h-96 overflow-y-auto">
                                                <pre className="text-xs text-gray-300 whitespace-pre-wrap font-mono">
                                                    {validationResult.correctionPrompt || 'Erro ao gerar prompt de correção'}
                                                </pre>
                                            </div>
                                        </div>

                                        {/* Action Buttons */}
                                        <div className="flex gap-3">
                                            <button
                                                onClick={() => {
                                                    setValidationResult(null);
                                                }}
                                                className="bg-blue-600 px-6 py-3 rounded-lg hover:bg-blue-700"
                                            >
                                                Tentar Novamente
                                            </button>
                                            <button
                                                onClick={() => setView('main')}
                                                className="glass-effect px-6 py-3 rounded-lg"
                                            >
                                                Cancelar
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'editDB') {
                const handleSaveDB = async () => {
                    try {
                        // Parse JSON string back to object before saving
                        const parsedDB = JSON.parse(editDBText);
                        await StorageManager.updateLN(currentLN.id, { continuityDB: parsedDB });
                        await refreshLN();
                        setView('main');
                        alert('Banco de dados atualizado!');
                    } catch (error) {
                        alert('Erro: JSON inválido! Verifique a sintaxe.');
                        console.error('JSON parse error:', error);
                    }
                };

                return (
                    <div className="min-h-screen p-8">
                        <div className="max-w-4xl mx-auto">
                            <button
                                onClick={() => setView('main')}
                                className="glass-effect px-4 py-2 rounded-lg mb-6 flex items-center gap-2"
                            >
                                <Icons.ArrowLeft />
                                Voltar
                            </button>
                            <div className="glass-effect p-8 rounded-lg">
                                <h2 className="text-2xl font-bold text-purple-300 mb-4">
                                    Editar Banco de Dados de Continuidade
                                </h2>
                                <textarea
                                    value={editDBText}
                                    onChange={(e) => setEditDBText(e.target.value)}
                                    className="w-full h-96 bg-black/50 border border-gray-700 rounded-lg p-4 text-gray-300 mb-4 font-mono text-sm"
                                />
                                <div className="flex gap-3">
                                    <button
                                        onClick={handleSaveDB}
                                        className="bg-green-600 px-6 py-3 rounded-lg hover:bg-green-700"
                                    >
                                        Salvar
                                    </button>
                                    <button
                                        onClick={() => setView('main')}
                                        className="glass-effect px-6 py-3 rounded-lg"
                                    >
                                        Cancelar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'read') {
                return <Reader ln={currentLN} onBack={() => setView('main')} initialChapter={selectedChapter} />;
            }

            return (
                <div className="min-h-screen p-8">
                    <div className="max-w-6xl mx-auto">
                        <button
                            onClick={onBack}
                            className="glass-effect px-4 py-2 rounded-lg mb-6 flex items-center gap-2"
                        >
                            <Icons.ArrowLeft />
                            Dashboard
                        </button>

                        <div className="glass-effect p-8 rounded-lg mb-6">
                            <div className="flex items-start justify-between mb-6">
                                <div>
                                    <h1 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">
                                        {currentLN.title}
                                    </h1>
                                    <p className="text-gray-400 mt-2">
                                        {currentLN.genres.join(' • ')}
                                    </p>
                                </div>
                                <div className="flex gap-2">
                                    <button
                                        onClick={() => {
                                            const dbText = typeof currentLN.continuityDB === 'string' 
                                                ? currentLN.continuityDB 
                                                : JSON.stringify(currentLN.continuityDB, null, 2);
                                            setEditDBText(dbText);
                                            setView('editDB');
                                        }}
                                        disabled={!currentLN.continuityDB}
                                        className="glass-effect px-4 py-2 rounded-lg flex items-center gap-2 disabled:opacity-50"
                                    >
                                        <Icons.Edit />
                                        Editar BD
                                    </button>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                <div className="bg-purple-500/20 p-4 rounded-lg border border-purple-500/30">
                                    <div className="text-sm text-gray-400 mb-2">📚 Gêneros</div>
                                    <div className="flex flex-wrap gap-2">
                                        {currentLN.genres.map((genre, idx) => (
                                            <span key={idx} className="text-xs bg-purple-500/30 text-purple-200 px-2 py-1 rounded-full">
                                                {genre}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-pink-500/20 p-4 rounded-lg border border-pink-500/30">
                                    <div className="text-sm text-gray-400 mb-2">⭐ Elementos</div>
                                    <div className="flex flex-wrap gap-2">
                                        {currentLN.elements.slice(0, 4).map((element, idx) => (
                                            <span key={idx} className="text-xs bg-pink-500/30 text-pink-200 px-2 py-1 rounded-full">
                                                {element.split(' ').slice(0, 3).join(' ')}
                                            </span>
                                        ))}
                                        {currentLN.elements.length > 4 && (
                                            <span className="text-xs text-pink-300">+{currentLN.elements.length - 4}</span>
                                        )}
                                    </div>
                                </div>
                            </div>
                            
                            {currentLN.notesList && currentLN.notesList.length > 0 && (
                                <div className="bg-blue-500/20 p-4 rounded-lg border border-blue-500/30 mb-6">
                                    <div className="text-sm text-gray-400 mb-2">📝 Notas Personalizadas</div>
                                    <ul className="space-y-1">
                                        {currentLN.notesList.map((note, idx) => (
                                            <li key={idx} className="text-sm text-blue-200">• {note}</li>
                                        ))}
                                    </ul>
                                </div>
                            )}
                            
                            <div className="grid grid-cols-2 gap-6 mb-6">
                                <div className="bg-green-500/20 p-4 rounded-lg border border-green-500/30">
                                    <div className="text-3xl font-bold text-green-300">
                                        {currentLN.chapters.length}
                                    </div>
                                    <div className="text-sm text-gray-400 mt-1">Capítulos</div>
                                </div>
                                <div className="bg-amber-500/20 p-4 rounded-lg border border-amber-500/30">
                                    <div className="text-3xl font-bold text-amber-300">
                                        {currentLN.lastReadChapter || '-'}
                                    </div>
                                    <div className="text-sm text-gray-400 mt-1">Última Leitura</div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6 mb-6">
                            <button
                                onClick={() => setView('prompt')}
                                className="glass-effect p-4 md:p-6 rounded-lg hover-glow transition-all text-left"
                            >
                                <div className="flex items-center gap-3 mb-2">
                                    <Icons.Copy />
                                    <h3 className="text-lg md:text-xl font-semibold">Gerar Prompt</h3>
                                </div>
                                <p className="text-gray-400 text-xs md:text-sm">
                                    Copie o prompt para o próximo capítulo ({currentLN.chapters.length + 1})
                                </p>
                            </button>

                            <button
                                onClick={() => setView('addChapter')}
                                className="glass-effect p-4 md:p-6 rounded-lg hover-glow transition-all text-left"
                            >
                                <div className="flex items-center gap-3 mb-2">
                                    <Icons.Plus />
                                    <h3 className="text-lg md:text-xl font-semibold">Adicionar Capítulo</h3>
                                </div>
                                <p className="text-gray-400 text-xs md:text-sm">
                                    Cole a resposta da IA para processar
                                </p>
                            </button>

                            <button
                                onClick={() => {
                                    setSelectedChapter(null);
                                    setView('read');
                                }}
                                disabled={currentLN.chapters.length === 0}
                                className="glass-effect p-4 md:p-6 rounded-lg hover-glow transition-all text-left disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                <div className="flex items-center gap-3 mb-2">
                                    <Icons.BookOpen />
                                    <h3 className="text-lg md:text-xl font-semibold">Modo Leitura</h3>
                                </div>
                                <p className="text-gray-400 text-xs md:text-sm">
                                    {currentLN.chapters.length === 0 ? 'Adicione capítulos primeiro' : 'Ler seus capítulos'}
                                </p>
                            </button>
                        </div>

                        {currentLN.chapters.length > 0 && (
                            <div className="glass-effect p-8 rounded-lg">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-2xl font-bold text-purple-300">Capítulos</h2>
                                    <button
                                        onClick={() => setView('read')}
                                        className="bg-gradient-to-r from-purple-500 to-pink-500 px-4 py-2 rounded-lg flex items-center gap-2"
                                    >
                                        <Icons.BookOpen />
                                        Modo Leitura
                                    </button>
                                </div>
                                <div className="space-y-3">
                                    {currentLN.chapters.map((chapter, idx) => (
                                        <div
                                            key={idx}
                                            className="bg-black/30 p-4 rounded-lg border border-gray-700 hover:border-purple-500/50 transition-all cursor-pointer"
                                            onClick={() => {
                                                setSelectedChapter(chapter);
                                                setView('read');
                                            }}
                                        >
                                            <div className="flex items-start justify-between">
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <h3 className="font-semibold text-lg">Capítulo {chapter.number}</h3>
                                                        {currentLN.lastReadChapter === chapter.number && (
                                                            <span className="text-xs bg-green-500/20 text-green-300 px-2 py-1 rounded-full border border-green-500/30">
                                                                📖 Última leitura
                                                            </span>
                                                        )}
                                                    </div>
                                                    
                                                    {/* Metadata Grid */}
                                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-2">
                                                        <div className="text-xs">
                                                            <span className="text-gray-500">IA:</span>
                                                            <span className="text-purple-300 ml-1 font-medium">
                                                                {chapter.metadata?.ai_provider || 'N/A'}
                                                            </span>
                                                        </div>
                                                        <div className="text-xs">
                                                            <span className="text-gray-500">Modelo:</span>
                                                            <span className="text-pink-300 ml-1 font-medium">
                                                                {chapter.metadata?.model || 'N/A'}
                                                            </span>
                                                        </div>
                                                        <div className="text-xs">
                                                            <span className="text-gray-500">Plano:</span>
                                                            <span className="text-blue-300 ml-1 font-medium">
                                                                {chapter.metadata?.plan || 'N/A'}
                                                            </span>
                                                        </div>
                                                        <div className="text-xs">
                                                            <span className="text-gray-500">Gerado:</span>
                                                            <span className="text-green-300 ml-1 font-medium">
                                                                {chapter.metadata?.generated_at 
                                                                    ? new Date(chapter.metadata.generated_at).toLocaleDateString('pt-BR')
                                                                    : 'N/A'}
                                                            </span>
                                                        </div>
                                                    </div>

                                                    <p className="text-sm text-gray-400">
                                                        Adicionado em {new Date(chapter.addedAt).toLocaleDateString('pt-BR')} às {new Date(chapter.addedAt).toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'})}
                                                    </p>
                                                </div>
                                                <Icons.BookOpen />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==================== READER ====================
        const Reader = ({ ln, onBack, initialChapter = null }) => {
            const [currentChapterIndex, setCurrentChapterIndex] = useState(() => {
                if (initialChapter) {
                    const index = ln.chapters.findIndex(ch => ch.number === initialChapter.number);
                    return index !== -1 ? index : 0;
                }
                // Use last read chapter if available
                if (ln.lastReadChapter) {
                    const index = ln.chapters.findIndex(ch => ch.number === ln.lastReadChapter);
                    if (index !== -1) return index;
                }
                return 0;
            });
            
            // Load global settings from ConfigManager
            const [settings, setSettings] = useState(() => ConfigManager.getReaderSettings());
            const [showSettings, setShowSettings] = useState(false);
            const contentRef = React.useRef(null);

            const currentChapter = ln.chapters[currentChapterIndex];

            // Save last read chapter when it changes
            useEffect(() => {
                if (currentChapter) {
                    StorageManager.updateLN(ln.id, { lastReadChapter: currentChapter.number });
                }
            }, [currentChapter, ln.id]);
            
            // Save settings globally when changed
            useEffect(() => {
                ConfigManager.setReaderSettings(settings);
            }, [settings]);
            
            // Restore scroll position when chapter changes
            useEffect(() => {
                if (currentChapter && contentRef.current) {
                    const savedScroll = ConfigManager.getScrollPosition(ln.id, currentChapter.number);
                    // Always reset scroll when chapter changes
                    setTimeout(() => {
                        if (contentRef.current) {
                            if (savedScroll > 0) {
                                // Restore saved position
                                const maxScroll = contentRef.current.scrollHeight - contentRef.current.clientHeight;
                                const scrollTo = maxScroll * (savedScroll / 100);
                                contentRef.current.scrollTop = scrollTo;
                            } else {
                                // Reset to top for new/unread chapters
                                contentRef.current.scrollTop = 0;
                            }
                        }
                    }, 100);
                }
            }, [currentChapter, ln.id]);
            
            // Save scroll position while scrolling
            const handleScroll = () => {
                if (currentChapter && contentRef.current) {
                    const scrollTop = contentRef.current.scrollTop;
                    const scrollHeight = contentRef.current.scrollHeight;
                    const clientHeight = contentRef.current.clientHeight;
                    const scrollPercentage = (scrollTop / (scrollHeight - clientHeight)) * 100;
                    ConfigManager.setScrollPosition(ln.id, currentChapter.number, scrollPercentage);
                }
            };

            const themes = {
                dark: { bg: 'bg-gray-900', text: 'text-gray-100' },
                sepia: { bg: 'bg-amber-50', text: 'text-amber-900' },
                black: { bg: 'bg-black', text: 'text-gray-300' }
            };

            const fonts = {
                serif: 'font-serif',
                sans: 'font-sans',
                mono: 'font-mono'
            };

            return (
                <div 
                    ref={contentRef}
                    onScroll={handleScroll}
                    className={`min-h-screen max-h-screen overflow-y-auto ${themes[settings.theme].bg} transition-colors`}
                >
                    {/* Header */}
                    <div className="sticky top-0 glass-effect border-b border-gray-700 z-10">
                        <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                            <button
                                onClick={onBack}
                                className="px-4 py-2 rounded-lg hover:bg-white/10 transition-colors flex items-center gap-2"
                            >
                                <Icons.ArrowLeft />
                                Voltar
                            </button>
                            <div className="text-center">
                                <div className="text-sm text-gray-400">{ln.title}</div>
                                <div className="font-semibold">Capítulo {currentChapter.number}</div>
                            </div>
                            <button
                                onClick={() => setShowSettings(!showSettings)}
                                className="px-4 py-2 rounded-lg hover:bg-white/10 transition-colors"
                            >
                                <Icons.Settings />
                            </button>
                        </div>

                        {/* Settings Panel */}
                        {showSettings && (
                            <div className="border-t border-gray-700 p-6 fade-in">
                                <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label className="block text-sm mb-2">Tamanho da Fonte: {settings.fontSize}px</label>
                                        <input
                                            type="range"
                                            min="14"
                                            max="28"
                                            value={settings.fontSize}
                                            onChange={(e) => setSettings({...settings, fontSize: parseInt(e.target.value)})}
                                            className="w-full"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-2">Espaçamento: {settings.lineHeight}</label>
                                        <input
                                            type="range"
                                            min="1.4"
                                            max="2.2"
                                            step="0.1"
                                            value={settings.lineHeight}
                                            onChange={(e) => setSettings({...settings, lineHeight: parseFloat(e.target.value)})}
                                            className="w-full"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-2">Fonte</label>
                                        <select
                                            value={settings.fontFamily}
                                            onChange={(e) => setSettings({...settings, fontFamily: e.target.value})}
                                            className="w-full bg-black/50 border border-gray-700 rounded-lg p-2"
                                        >
                                            <option value="serif">Serif</option>
                                            <option value="sans">Sans-serif</option>
                                            <option value="mono">Monospace</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm mb-2">Tema</label>
                                        <select
                                            value={settings.theme}
                                            onChange={(e) => setSettings({...settings, theme: e.target.value})}
                                            className="w-full bg-black/50 border border-gray-700 rounded-lg p-2"
                                        >
                                            <option value="dark">Escuro</option>
                                            <option value="sepia">Sépia</option>
                                            <option value="black">Preto Puro</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Content */}
                    <div className="max-w-4xl mx-auto px-6 py-12">
                        <div
                            className={`${themes[settings.theme].text} ${fonts[settings.fontFamily]} whitespace-pre-wrap`}
                            style={{
                                fontSize: `${settings.fontSize}px`,
                                lineHeight: settings.lineHeight
                            }}
                        >
                            {currentChapter.content}
                        </div>
                    </div>

                    {/* Navigation */}
                    <div className="sticky bottom-0 glass-effect border-t border-gray-700">
                        <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
                            <button
                                onClick={() => setCurrentChapterIndex(Math.max(0, currentChapterIndex - 1))}
                                disabled={currentChapterIndex === 0}
                                className="px-6 py-2 rounded-lg hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                            >
                                ← Anterior
                            </button>
                            <div className="text-sm text-gray-400">
                                {currentChapterIndex + 1} de {ln.chapters.length}
                            </div>
                            <button
                                onClick={() => setCurrentChapterIndex(Math.min(ln.chapters.length - 1, currentChapterIndex + 1))}
                                disabled={currentChapterIndex === ln.chapters.length - 1}
                                className="px-6 py-2 rounded-lg hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                            >
                                Próximo →
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==================== MAIN APP ====================
        const App = () => {
            const [currentView, setCurrentView] = useState('dashboard');
            const [selectedLN, setSelectedLN] = useState(null);

            const handleCreateNew = () => {
                setCurrentView('create');
            };

            const handleCreationComplete = (ln) => {
                setSelectedLN(ln);
                setCurrentView('manager');
            };

            const handleSelectLN = (ln) => {
                setSelectedLN(ln);
                setCurrentView('manager');
            };

            const handleBackToDashboard = () => {
                setSelectedLN(null);
                setCurrentView('dashboard');
            };

            return (
                <>
                    {currentView === 'dashboard' && (
                        <Dashboard onCreateNew={handleCreateNew} onSelectLN={handleSelectLN} />
                    )}
                    {currentView === 'create' && (
                        <CreationForm onBack={handleBackToDashboard} onComplete={handleCreationComplete} />
                    )}
                    {currentView === 'manager' && selectedLN && (
                        <LNManager ln={selectedLN} onBack={handleBackToDashboard} />
                    )}
                </>
            );
        };

        // Render
        ReactDOM.render(<App />, document.getElementById('root'));

    </script>
</body>
</html>
